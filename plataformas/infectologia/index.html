<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfectoAtlas — ELID</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Parisienne&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#f59f0a; --accent-soft:rgba(245,159,10,.14);
  --deep-plum:#2d1b2e; --rose-gold:#b76e79; --champagne:#f7e7ce;
  --ivory:#faf6f0; --soft-mauve:#c9a0b0; --credit-rose:#b06a75;
  --correct:#3ddc84; --correct-soft:rgba(61,220,132,.16);
  --bg:#2d1b2e; --ink:#faf6f0; --muted:rgba(250,246,240,.6);
  --panel:rgba(245,159,10,.05); --line:rgba(245,159,10,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif; color:var(--ink);
  background:
    radial-gradient(900px 600px at 85% 8%, rgba(245,159,10,.10), transparent 60%),
    linear-gradient(160deg,#2d1b2e 0%, #34203a 60%, #2a1828 100%);
  overflow-x:hidden;
}
body.light{ --bg:#faf6f0; --ink:#2d1b2e; --muted:rgba(45,27,46,.65);
  --panel:rgba(245,159,10,.07); --line:rgba(245,159,10,.22);
  background:linear-gradient(160deg,#faf6f0,#efe5d6);}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
*{scrollbar-color:var(--accent) transparent}
.hidden{display:none!important}

.bgart{position:fixed;top:0;right:0;width:46%;height:100%;z-index:0;pointer-events:none;
  color:var(--accent);opacity:.13;display:flex;align-items:center;justify-content:flex-end}
.bgart svg{width:100%;height:100%;object-fit:cover}

.font-title{font-family:'Fraunces',serif}
.font-brand{font-family:'Parisienne',cursive}
.font-vibes{font-family:'Great Vibes',cursive}
.font-cormorant{font-family:'Cormorant Garamond',serif}

/* ---------- crédito ELID + tributo ---------- */
.elid-credit{font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:.92rem;letter-spacing:.04em;line-height:1.3}
.elid-credit b{color:var(--credit-rose);font-weight:600}
.elid-tribute{font-family:'Great Vibes',cursive;color:var(--ink);font-size:1.15rem;line-height:1.2;opacity:.92}
.elid-tribute b{color:var(--credit-rose)}

/* ---------- GATE ---------- */
#gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{position:relative;text-align:center;max-width:440px;padding:46px 38px;border-radius:24px;
  background:rgba(45,27,46,.55);backdrop-filter:blur(20px);border:1px solid var(--line)}
.gate-logo{position:relative;width:120px;height:120px;margin:0 auto 18px;color:var(--accent)}
.gate-logo svg{width:120px;height:120px}
.gate-glow{position:absolute;inset:-30%;background:radial-gradient(circle,var(--accent-soft),transparent 65%);filter:blur(14px);z-index:-1}
.gate-name{font-family:'Parisienne',cursive;font-size:3rem;color:var(--ink);margin:6px 0 4px}
.gate-supra{font-family:'Cormorant Garamond',serif;letter-spacing:.4em;text-transform:uppercase;font-size:.7rem;color:var(--accent)}
.gate-desc{color:var(--muted);font-size:.9rem;margin:14px 0 22px;line-height:1.5}
.btn-primary{display:inline-block;cursor:pointer;border:none;padding:13px 30px;border-radius:30px;
  background:var(--accent);color:#2d1b2e;font-weight:600;font-size:.92rem;letter-spacing:.03em;transition:.25s}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 0 24px var(--accent-soft);transform:translateY(-1px)}

/* ---------- APP ---------- */
#app{position:relative;z-index:10;min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:62px;display:flex;align-items:center;gap:18px;
  padding:0 22px;background:rgba(45,27,46,.5);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);z-index:60}
body.light .topbar{background:rgba(255,255,255,.6)}
.tb-burger,.tb-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(45,27,46,.4);
  background:transparent;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s}
body.light .tb-burger,body.light .tb-btn{border-color:rgba(45,27,46,.3)}
.tb-burger{color:var(--accent);border-color:transparent}
.tb-btn:hover,.tb-burger:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px var(--accent-soft)}
.tb-brand{font-family:'Parisienne',cursive;font-size:1.7rem;color:var(--ink)}
.tb-search{flex:1;max-width:360px;display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:24px;
  border:1px solid rgba(45,27,46,.35);color:var(--muted)}
body.light .tb-search{border-color:rgba(45,27,46,.25)}
.tb-search input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-size:.85rem}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-avatar{width:40px;height:40px;border-radius:50%;border:1px solid rgba(45,27,46,.4);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Parisienne',cursive;font-weight:700;
  font-size:1.3rem;color:var(--ink);transition:.25s}
.tb-avatar:hover{border-color:var(--accent);color:var(--accent)}

/* sidebar */
.sidebar{position:fixed;top:62px;left:0;bottom:0;width:264px;padding:24px 16px;overflow-y:auto;
  background:rgba(45,27,46,.4);backdrop-filter:blur(16px);border-right:1px solid var(--line);z-index:50;
  display:flex;flex-direction:column;transition:width .3s}
body.light .sidebar{background:rgba(255,255,255,.5)}
.sb-head{text-align:center;margin-bottom:18px}
.sb-logo{position:relative;width:62px;height:62px;margin:0 auto 8px;color:var(--accent)}
.sb-logo svg{width:62px;height:62px}
.sb-glow{position:absolute;inset:-35%;background:radial-gradient(circle,var(--accent-soft),transparent 65%);filter:blur(10px);z-index:-1}
.sb-name{font-family:'Parisienne',cursive;font-size:1.5rem;color:var(--ink)}
.sb-credit{margin-top:4px}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;cursor:pointer;
  color:var(--muted);font-size:.88rem;font-weight:500;transition:.2s;border:1px solid transparent}
.nav-item svg{width:20px;height:20px;flex:none;stroke:currentColor}
.nav-item:hover{color:var(--ink);background:var(--panel)}
.nav-item.active{color:var(--accent);background:var(--accent-soft);border-color:var(--line)}
.nav-sec{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:14px 12px 4px;opacity:.8}
.sb-foot{margin-top:auto;padding-top:18px;text-align:center}
.sidebar.collapsed{width:78px}
.sidebar.collapsed .sb-name,.sidebar.collapsed .sb-credit,.sidebar.collapsed .nav-item span,
.sidebar.collapsed .nav-sec,.sidebar.collapsed .sb-foot{display:none}
.sidebar.collapsed .sb-logo{width:46px;height:46px}.sidebar.collapsed .sb-logo svg{width:46px;height:46px}
.sidebar.collapsed .nav-item{justify-content:center}

/* main */
.main{margin-left:264px;margin-top:62px;padding:34px 40px 60px;transition:margin .3s;position:relative;z-index:5}
.main.wide{margin-left:78px}
@media(max-width:880px){.sidebar{width:78px}.sidebar .sb-name,.sidebar .sb-credit,.sidebar .nav-item span,.sidebar .nav-sec,.sidebar .sb-foot{display:none}.sidebar .nav-item{justify-content:center}.main{margin-left:78px;padding:24px 18px}}

.view{animation:fade .45s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page-title{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.page-title svg{width:34px;height:34px;color:var(--accent);stroke:currentColor}
.page-title h1{font-family:'Fraunces',serif;font-weight:600;font-size:2rem;
  background:linear-gradient(120deg,var(--ink),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.page-sub{color:var(--muted);font-size:.9rem;margin-bottom:26px}

/* hero dashboard */
.hero{display:flex;gap:32px;align-items:center;flex-wrap:wrap;padding:30px;border-radius:22px;
  background:var(--panel);border:1px solid var(--line);margin-bottom:30px}
.hero-symbol{position:relative;width:180px;height:180px;flex:none;color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.3s}
.hero-symbol:hover{transform:scale(1.04)}
.hero-symbol svg{width:160px;height:160px}
.hero-symbol .sb-glow{inset:-20%}
.hero-info{flex:1;min-width:240px}
.hero-info h2{font-family:'Fraunces',serif;font-size:1.7rem;color:var(--accent);margin-bottom:4px}
.hero-rank{display:inline-block;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--line);border-radius:20px;padding:4px 12px;margin:6px 0 14px}
.prog{height:8px;border-radius:6px;background:rgba(245,159,10,.15);overflow:hidden;margin-top:6px}
.prog>i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .6s}

.grid{display:grid;gap:18px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
@media(max-width:760px){.grid-3{grid-template-columns:1fr}}
.card{padding:20px;border-radius:16px;background:var(--panel);border:1px solid var(--line);transition:.25s}
.card:hover{border-color:var(--accent);transform:translateY(-3px)}
.stat-n{font-family:'Fraunces',serif;font-size:2rem;color:var(--accent)}
.stat-l{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.sec-title{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--ink);margin:30px 0 14px}
.qa{cursor:pointer}.qa h3{font-size:1rem;margin-bottom:4px;color:var(--ink)}.qa p{font-size:.8rem;color:var(--muted)}

/* módulos */
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--panel)}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;font-family:'Fraunces',serif;font-size:1.05rem;color:var(--ink)}
.acc-head:hover{color:var(--accent)}
.acc-body{display:none;padding:6px 14px 16px}
.acc.open .acc-body{display:block}
.mod-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--muted);transition:.2s}
.mod-item:hover{background:var(--accent-soft);color:var(--accent)}
.tag-soon{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);border-radius:12px;padding:2px 8px;color:var(--muted)}

/* abas do módulo */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 22px;border-bottom:1px solid var(--line);padding-bottom:10px}
.tab{padding:7px 13px;border-radius:18px;cursor:pointer;font-size:.8rem;color:var(--muted);border:1px solid transparent;transition:.2s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);background:var(--accent-soft);border-color:var(--line)}
.subtabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.subtab{padding:6px 12px;border-radius:14px;cursor:pointer;font-size:.76rem;color:var(--muted);border:1px solid var(--line)}
.subtab.active{color:var(--accent);background:var(--accent-soft)}
.placeholder{padding:40px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}
.placeholder svg{width:40px;height:40px;color:var(--accent);margin-bottom:10px}
.fc-create{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:.82rem;color:var(--accent);
  border:1px solid var(--line);border-radius:20px;padding:7px 14px;margin-bottom:14px}
.fc-create:hover{background:var(--accent-soft)}

/* coleção */
.patg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.patg{aspect-ratio:3/4;border-radius:14px;border:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  color:var(--muted);font-size:.78rem;text-align:center;padding:10px;transition:.25s;position:relative}
.patg.locked{opacity:.45;filter:grayscale(1)}
.patg:hover{border-color:var(--accent);transform:translateY(-3px)}
.patg .lk{width:34px;height:34px;color:var(--accent);stroke:currentColor}

.page-foot{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);text-align:center}
</style>
</head>

<script>const MODULES={"bases": ["Antimicrobianos", "Sepse", "Infecção Hospitalar"], "bacterias": ["Tuberculose", "Hanseníase", "Sífilis", "Leptospirose", "Meningite Bacteriana", "Endocardite Infecciosa", "Pneumonias Bacterianas", "Infecções de Pele e Partes Moles"], "virus": ["HIV", "Hepatites Virais", "Dengue", "Arboviroses", "Influenza", "COVID-19", "Herpesvírus"], "fungos": ["Candidíase", "Criptococose", "Histoplasmose", "Aspergilose"], "parasitas": ["Toxoplasmose", "Malária", "Leishmaniose", "Doença de Chagas", "Esquistossomose"], "sindromes": ["Febre de Origem Indeterminada", "Bacteremia", "Infecção de Corrente Sanguínea"], "farmaco": ["Antibióticos", "Antifúngicos", "Antivirais", "Antiparasitários"]};const CH={"bases": "1. Bases da Infectologia", "bacterias": "2. Bactérias", "virus": "3. Vírus", "fungos": "4. Fungos", "parasitas": "5. Parasitas", "sindromes": "6. Síndromes Infecciosas", "farmaco": "7. Farmacologia"};const PATOGENOS={"Bactérias": ["S. pneumoniae", "S. aureus", "M. tuberculosis", "T. pallidum", "N. meningitidis", "Leptospira sp."], "Vírus": ["HIV", "HBV", "HCV", "Dengue", "Influenza", "SARS-CoV-2"], "Fungos": ["Candida sp.", "Cryptococcus", "Histoplasma", "Aspergillus"], "Parasitas": ["Toxoplasma", "Plasmodium", "Leishmania", "T. cruzi", "Schistosoma"]};</script>

<!-- ===================== NÚCLEO (Firebase + estado) ===================== -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const PLATFORM_ID='infectologia';
const LS_PREFIX='atlas_infectologia_progress';
const AREA_KEY='cm';
const firebaseConfig={apiKey:"AIzaSyAKN3qsYIc3pel81vl8WEAH6Ob4oR-icAM",authDomain:"jackeline-study-platform.firebaseapp.com",projectId:"jackeline-study-platform",storageBucket:"jackeline-study-platform.firebasestorage.app",messagingSenderId:"574246127117",appId:"1:574246127117:web:29eedab81ea4251b23f744"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
let uid=null, unsubCentral=null;

// ---------- estado ----------
let S=loadLocal();
function blankState(){return {_updated:0, done:{}, srs:{}, cards:[], notes:{}, dia:{}, diaSeen:{}, qSeen:0, qRight:0};}
function loadLocal(){
  let base=blankState();
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && k.startsWith('atlas_'+PLATFORM_ID)){
        const o=JSON.parse(localStorage.getItem(k)||'{}'); base=mergeState(base,o);
      }
    }
  }catch(e){}
  return base;
}
function mergeState(a,b){
  if(!b) return a;
  const out={...a};
  out._updated=Math.max(a._updated||0,b._updated||0);
  for(const m of ['done','srs','notes','dia','diaSeen']){
    out[m]={...(a[m]||{}),...(b[m]||{})};        // união de mapas (local vence empate via ordem)
  }
  out.cards=[...(a.cards||[]),...(b.cards||[])].filter((c,i,arr)=>arr.findIndex(x=>x.id===c.id)===i);
  out.qSeen=Math.max(a.qSeen||0,b.qSeen||0);
  out.qRight=Math.max(a.qRight||0,b.qRight||0);
  return out;
}
function sanitize(o){return JSON.parse(JSON.stringify(o));}

function saveState(){
  S._updated=Date.now();
  const clean=sanitize(S);
  try{localStorage.setItem(LS_PREFIX, JSON.stringify(clean));}catch(e){}
  if(uid){
    setDoc(doc(db,'users',uid,'platforms',PLATFORM_ID,'state','current'),{
      desempenho:{questoesRespondidas:clean.qSeen||0, questoesCorretas:clean.qRight||0},
      state:clean, _updated:clean._updated
    },{merge:true}).catch(()=>{});
    pushRadar(); pushCentral();
  }
}

// ---------- RADAR ----------
function pushRadar(){
  if(!uid) return;
  setDoc(doc(db,'users',uid,'desempenho','areas'),
    {[AREA_KEY]:{tot:S.qSeen||0, ac:S.qRight||0}},{merge:true}).catch(()=>{});
}
window.elidRegistrarQuestoes=function(areaKey, tot, ac){
  S.qSeen=(S.qSeen||0)+tot; S.qRight=(S.qRight||0)+ac; saveState();
};

// ---------- CENTRAL (bidirecional) ----------
function pushCentral(){
  if(!uid) return;
  const payload={
    platform:PLATFORM_ID, label:'InfectoAtlas', updated:Date.now(),
    cards:0, questions:0,
    done:{ q:sanitize(S.done||{}), srs:sanitize(S.srs||{}), userCards:sanitize(S.cards||[]) }
  };
  setDoc(doc(db,'users',uid,'central',PLATFORM_ID), payload,{merge:true}).catch(()=>{});
}
function bindCentral(){
  if(!uid) return;
  unsubCentral=onSnapshot(doc(db,'users',uid,'central',PLATFORM_ID),(snap)=>{
    const d=snap.data(); if(!d||!d.done) return;
    S.done=mergeMap(S.done,d.done.q);
    S.srs=mergeMap(S.srs,d.done.srs);
    if(Array.isArray(d.done.userCards)){
      const ids=new Set((S.cards||[]).map(c=>c.id));
      d.done.userCards.forEach(c=>{if(c&&!ids.has(c.id))S.cards.push(c);});
    }
    // refletir no diaSeen de hoje
    const seed=daySeedNum();
    for(const id in S.done){ S.diaSeen[seed+':'+id]=true; }
    renderRoute();
  });
}
function mergeMap(a,b){a=a||{};b=b||{};return {...b,...a};}

// ---------- SRS (SM-2) ----------
function daySeedNum(){return Math.floor(Date.now()/86400000);}
function srsReview(id, q){ // q: 0..5
  const c=S.srs[id]||{ease:2.5,interval:0,due:0,reps:0};
  if(q<3){c.reps=0;c.interval=1;}
  else{
    c.reps++;
    if(c.reps===1)c.interval=1; else if(c.reps===2)c.interval=6;
    else c.interval=Math.round(c.interval*c.ease);
    c.ease=Math.max(1.3, c.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  }
  c.due=Date.now()+c.interval*86400000;
  S.srs[id]=c; saveState();
}
function cardsDue(){const now=Date.now();return Object.keys(S.srs).filter(id=>(S.srs[id].due||0)<=now);}

// ---------- AUTH gate ----------
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    return;
  }
  uid=user.uid;
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  // nome / avatar
  const nm=(user.displayName||user.email||'Aluno').trim();
  window.__USERNAME__=nm;
  document.getElementById('avatar').textContent=nm[0].toUpperCase();
  // puxar nuvem
  try{
    const snap=await getDoc(doc(db,'users',uid,'platforms',PLATFORM_ID,'state','current'));
    if(snap.exists()){
      const d=snap.data();
      if(d.state) S=mergeState(S, d.state);
    }
  }catch(e){}
  bindCentral();
  bootUI();
});

document.getElementById('go-elid').addEventListener('click',()=>{ window.location.href='../../landing-page/'; });
document.getElementById('btn-logout').addEventListener('click',()=>{ window.location.href='../../biblioteca-web/'; });
document.getElementById('avatar').addEventListener('click',()=>{ navigate('dashboard'); });

// expor para UI
window.__S=()=>S;
window.__save=saveState;
window.__srsReview=srsReview;
window.__cardsDue=cardsDue;
window.__daySeed=daySeedNum;
</script>

};

const TABS=[['teoria','Teoria'],['escores','Escores/Critérios'],['questoes','Questões'],['flashcards','Flashcards'],
['casos','Casos Clínicos'],['fluxo_dx','Fluxograma Diagnóstico'],['fluxo_cond','Fluxograma de Conduta'],
['mapa','Mapa Mental'],['dif','Diferenciais'],['vespera','Revisão de Véspera'],['dicas','Dicas e Erros'],
['checklist','Checklist de Domínio'],['notas','Anotações']];

['risco','Fatores de Risco'],['clinica','Quadro Clínico'],['dx','Diagnóstico'],['tto','Tratamento']];

let route={view:'dashboard'};
function navigate(view,arg){route={view,arg};renderRoute();}

function bootUI(){ buildNav(); renderRoute(); }

function buildNav(){
  const nav=document.getElementById('nav');
  let h=`<div class="nav-item active" data-v="dashboard" onclick="navigate('dashboard')">${ICONS.dashboard}<span>Dashboard</span></div>`;
  h+=`<div class="nav-item" data-v="collection" onclick="navigate('collection')">${ICONS.collection}<span>Coleção de Patógenos</span></div>`;

    h+=`<div class="nav-item" data-v="ch:${ck}" onclick="navigate('modules','${ck}')">${ICONS.modules}<span>${CH[ck].replace(/^\d+\.\s/,'')}</span></div>`;
  }
  nav.innerHTML=h;
}
function setActive(v){document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.v===v));}

function renderRoute(){
  const main=document.getElementById('main');

  if(route.view==='dashboard'){setActive('dashboard');main.innerHTML=viewDashboard(nm);}
  else if(route.view==='collection'){setActive('collection');main.innerHTML=viewCollection();}
  else if(route.view==='daily'){setActive('daily');main.innerHTML=viewDaily();}
  else if(route.view==='srs'){setActive('srs');main.innerHTML=viewSRS();}
  else if(route.view==='modules'){setActive('ch:'+route.arg);main.innerHTML=viewModules(route.arg);}
  else if(route.view==='module'){main.innerHTML=viewModule(route.arg);}
}

function foot(){return `<div class="page-foot">
  <div class="elid-credit"><b>E</b>nsino <b>L</b>egitimado para <b>I</b>nternos em <b>D</b>esenvolvimento</div>

function viewDashboard(nm){

let curTab='teoria', curSub='entendendo';
function viewModule(arg){
