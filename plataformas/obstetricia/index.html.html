    theory:`
<h3>Conceito e fatores de risco</h3>
<p>Parto entre <b>20-22 e 37 semanas</b>. FR: <b>parto prematuro anterior</b> (principal), RPMO, infecções, gestação múltipla, polidrâmnio. Predição: <b>colo curto</b> (&lt;25mm no USGTV 18-24s) e <b>fibronectina fetal</b> (alto VPN).</p>
<h3>Prevenção</h3>
<ul>
<li><b>Colo curto OU parto prematuro prévio:</b> progesterona vaginal (16s até 36s);</li>
<li><b>Colo curto + parto prematuro prévio:</b> progesterona + <b>cerclagem</b>.</li>
</ul>
<h3>Tocólise (segura 48h para o corticoide)</h3>
<p><b>Nifedipina</b> (1ª escolha; evitar se hipotensão/ICC), <b>atosiban</b> (caro, menos efeitos colaterais — 1ª em serviços privados), <b>indometacina</b> (só &lt;32s — fecha canal arterial), betamiméticos (muitos efeitos). <b>Sulfato de magnésio NÃO é mais tocolítico</b> — usado para <b>neuroproteção (24-32s)</b>.</p>
<h3>Corticoterapia (24-34s)</h3>
<p><b>Betametasona</b> 12mg IM 24/24h (2 doses) ou <b>dexametasona</b> 6mg 12/12h (4 doses). Reduz doença da membrana hialina, hemorragia intraventricular, enterocolite necrosante e mortalidade.</p>`,

    theory:`
<h3>Terminologia</h3>
<ul>
<li><b>Zigosidade</b> (nº de óvulos): mono ou <b>dizigótica</b> (mais comum);</li>
<li><b>Corionicidade</b> (nº de placentas): mono ou dicoriônica;</li>
<li><b>Amnionicidade</b> (nº de cavidades): mono ou diamniótica.</li>
</ul>
<p><b>Dizigótica → sempre dicoriônica e diamniótica.</b> Monozigótica pode ser dicoriônica (divisão &lt;72h). O que importa é o <b>córion</b> — monocoriônica é a de maior risco.</p>
<h3>Diagnóstico da corionicidade</h3>
<p><b>Sinal do λ / Y</b> = dicoriônica; <b>sinal do T</b> = monocoriônica. Sexos diferentes = dizigótica (dicoriônica). Avaliar até 16 semanas.</p>
<h3>Complicação: síndrome de transfusão feto-fetal (STFF)</h3>
<p>Especialmente <b>monocoriônica diamniótica</b>: um doador (pequeno, oligodrâmnio) e um receptor (grande, polidrâmnio). Critério mais sensível: <b>discrepância de bolsões</b>. Tratamento: amniocentese seriada (leve) ou <b>fotocoagulação a laser</b> (grave). Parto por cesárea.</p>
<h3>Via de parto</h3>
<ul>
<li><b>Monoamniótica → cesárea</b> (cordões entrelaçados);</li>
<li>1º gemelar não cefálico → cesárea;</li>
<li>2º muito maior que o 1º → cesárea.</li>
</ul>`,

<script>
/* ---- Flashcards Inteligentes: configuração da plataforma OBSTETRÍCIA ---- */
window.FC_CFG = {
  getState: function(){ return App.state; },
  save: function(){ try{ save(); }catch(e){} },
  meta: function(id){ var t=null; try{ t=topicById(id); }catch(e){} var mod=(t&&t._mod&&t._mod.title)?t._mod.title:'Obstetrícia'; return t?{title:(t.title||id), mod:mod}:{title:id, mod:'Obstetrícia'}; },
  reward: function(label){ /* Obstetrícia não usa XP; gamificação é por progresso/checks */ },
  toast: function(title, sub){ try{ if(typeof toast==='function') toast(title+(sub?(' — '+sub):'')); }catch(e){} },
  panelHost: function(){ var v=document.getElementById('main'); if(!v) return null; var before=v.querySelector('.tp-status')||v.querySelector('.panel'); return {host:v, before:before}; },
  installHook: function(mount){ if(typeof renderTopic==='function'){ var _o=renderTopic; renderTopic=function(id){ _o(id); try{ mount(id); }catch(e){} }; } }
};

/* ============================================================
   FLASHCARDS INTELIGENTES — módulo compartilhado (aditivo)
   Depende apenas de window.FC_CFG (definido por cada plataforma).
   NÃO altera nada existente: cria suas próprias funções/estilos.
   ============================================================ */
(function(){
  if(window.__FCX_LOADED__) return; window.__FCX_LOADED__=true;
  var CFG = window.FC_CFG || {};
  function S(){ try{ return CFG.getState ? CFG.getState() : null; }catch(e){ return null; } }
  function save(){ try{ if(CFG.save) CFG.save(); }catch(e){} }
  function meta(id){ try{ return (CFG.meta && CFG.meta(id)) || {title:id,mod:''}; }catch(e){ return {title:id,mod:''}; } }
  function reward(l){ try{ if(CFG.reward) CFG.reward(l); }catch(e){} }
  function ptoast(t,s){ try{ if(CFG.toast) CFG.toast(t,s); }catch(e){} }

  function fq(s,c){ return (c||document).querySelector(s); }
  function fa(s,c){ return Array.prototype.slice.call((c||document).querySelectorAll(s)); }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function safeUrl(u){ u=(u||'').trim(); return /^https?:\/\//i.test(u)?u:''; }

  /* ---- dados ---- */
  function UC(){ var s=S(); if(!s) return {}; if(!s.userCards) s.userCards={}; return s.userCards; }
  function STT(){ var s=S(); if(!s) return {created:0,reviewed:0}; if(!s.fcStats) s.fcStats={created:0,reviewed:0}; return s.fcStats; }
  function arr(){ var u=UC(); return Object.keys(u).map(function(k){ return u[k]; }); }
  function forTopic(id){ return arr().filter(function(c){ return c.topicId===id; }); }
  function mastered(c){ return (c.interval||0)>=21; }
  function due(c){ return (c.due||0)<=Date.now(); }
  function dueCards(){ return arr().filter(due).sort(function(a,b){ return (a.due||0)-(b.due||0); }); }
  function tStats(id){ var a=forTopic(id); return {total:a.length, dom:a.filter(mastered).length, pend:a.filter(due).length}; }

  function createCard(data){
    var s=S(); if(!s){ ptoast('Faça login','Entre na sua conta para salvar flashcards.'); return null; }
    var id='fc_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
    var card={ id:id, type:'fv', front:'', back:'', text:'', statement:'', answer:true, image:'', occ:null,
      modId:'', modName:'', topicId:'', topicTitle:'',
      created:Date.now(), reviews:0, correct:0, diff:'novo', ease:2.5, interval:0, due:Date.now() };
    for(var k in data){ card[k]=data[k]; }
    UC()[id]=card; STT().created=(STT().created||0)+1; save();
    return card;
  }
  function delCard(id){ var u=UC(); if(u[id]){ delete u[id]; save(); } }
  function rate(c,q){
    c.reviews=(c.reviews||0)+1; if(q>=2) c.correct=(c.correct||0)+1;
    var e=(c.ease||2.5), iv=(c.interval||0);
    if(q===0){ c.interval=0; c.ease=Math.max(1.3,e-0.2); c.diff='dificil'; c.due=Date.now()+10*60*1000; }
    else if(q===2){ c.interval=iv<=0?1:Math.max(1,Math.round(iv*1.2)); c.ease=Math.max(1.3,e-0.15); c.diff='dificil'; c.due=Date.now()+c.interval*864e5; }
    else if(q===3){ c.interval=iv<=0?1:Math.round(iv*e); c.diff='medio'; c.due=Date.now()+c.interval*864e5; }
    else { c.interval=iv<=0?2:Math.round(iv*e*1.3); c.ease=e+0.05; c.diff='facil'; c.due=Date.now()+c.interval*864e5; }

    save();
  }

  function typeName(t){ return {fv:'Frente / Verso', qa:'Pergunta / Resposta', cloze:'Cloze (lacuna)', vf:'Verdadeiro ou Falso', img:'Imagem + Pergunta', occ:'Oclusão de Imagem'}[t]||t; }
  function diffBadge(c){ if(mastered(c)) return '<span class="fcx-badge fcx-b-dom">dominado</span>'; var d=c.diff||'novo',cl={novo:'fcx-b-novo',dificil:'fcx-b-dificil',medio:'fcx-b-medio',facil:'fcx-b-facil'}[d]||'fcx-b-novo'; return '<span class="fcx-badge '+cl+'">'+d+'</span>'; }
  function snippet(c){ var t=c.type==='cloze'?c.text:(c.type==='vf'?c.statement:(c.type==='occ'?(c.back||'Oclusão de imagem'):c.front)); t=(t||'').replace(/\{\{(.+?)\}\}/g,'$1'); return esc(t).slice(0,100)||'(cartão)'; }

  function frontHTML(c){

  /* ---- painel fixo dentro do tópico ---- */
  function buildPanel(id){
    var m=meta(id);
    var panel=document.createElement('div'); panel.className='fcx-panel'; panel.setAttribute('data-fcxpanel', id);
    panel.innerHTML=
      '<div class="fcx-head"><div class="fcx-title">🗂️ Flashcards Inteligentes</div><div class="fcx-stat" data-stat></div></div>'+
      '<div class="fcx-types" data-types>'+['fv','qa','cloze','vf','img','occ'].map(function(t,i){ return '<button type="button" data-t="'+t+'"'+(i===0?' class="on"':'')+'>'+typeName(t)+'</button>'; }).join('')+'</div>'+
      '<div class="fcx-fields" data-fields>'+fieldsHTML('fv')+'</div>'+
      '<div class="fcx-actions"><span class="fcx-key">Captura rápida — Ctrl+Enter salva <span class="fcx-saved" data-saved>salvo ✓</span></span><button type="button" class="fcx-save">Salvar flashcard</button></div>'+
      '<details class="fcx-listwrap"><summary>Ver flashcards deste tópico (<span data-count>0</span>)</summary><div class="fcx-list" data-list></div><button type="button" class="fcx-revtopic">Revisar este tópico</button></details>';

    var curType='fv', occRect=null;
    var typesW=fq('[data-types]',panel), fieldsW=fq('[data-fields]',panel);
    function bindVF(){ var vf=fq('.fcx-vf',fieldsW); if(vf) fa('button',vf).forEach(function(b){ b.onclick=function(){ fa('button',vf).forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); }; }); }
    function wireOcc(){
      var edit=fq('[data-occedit]',fieldsW), urlI=fq('[data-f="image"]',fieldsW); if(!edit||!urlI) return;
      function load(){
        occRect=null; edit.innerHTML='';
        var u=safeUrl(urlI.value); if(!u){ edit.innerHTML='<div class="fcx-occ-hint">Cole o link da imagem acima.</div>'; return; }
        var wrap=document.createElement('div'); wrap.className='fcx-occ-wrap fcx-occ-draw';
        var img=document.createElement('img'); img.src=u; img.alt='';
        var sel=document.createElement('div'); sel.className='fcx-occ-mask'; sel.style.display='none';
        wrap.appendChild(img); wrap.appendChild(sel);
        var hint=document.createElement('div'); hint.className='fcx-occ-hint'; hint.textContent='Arraste sobre a imagem para ocultar a parte que quer testar.';
        edit.appendChild(wrap); edit.appendChild(hint);
        var draw=false,sx=0,sy=0;
        function P(e){ var r=wrap.getBoundingClientRect(); var cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; return {x:Math.max(0,Math.min(1,(cx-r.left)/r.width)), y:Math.max(0,Math.min(1,(cy-r.top)/r.height))}; }
        function U(p){ var x=Math.min(sx,p.x),y=Math.min(sy,p.y),w=Math.abs(p.x-sx),h=Math.abs(p.y-sy); sel.style.display='block'; sel.style.left=(x*100)+'%'; sel.style.top=(y*100)+'%'; sel.style.width=(w*100)+'%'; sel.style.height=(h*100)+'%'; occRect={x:x,y:y,w:w,h:h}; }
        function dn(e){ e.preventDefault(); draw=true; var p=P(e); sx=p.x; sy=p.y; U(p); }
        function mv(e){ if(!draw) return; e.preventDefault(); U(P(e)); }
        function up(){ if(!draw) return; draw=false; if(occRect&&(occRect.w<0.02||occRect.h<0.02)){ occRect=null; sel.style.display='none'; } }
        wrap.addEventListener('mousedown',dn); window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
        wrap.addEventListener('touchstart',dn,{passive:false}); wrap.addEventListener('touchmove',mv,{passive:false}); wrap.addEventListener('touchend',up);
      }
      urlI.addEventListener('change',load); urlI.addEventListener('blur',load);
    }
    function renderFields(){ fieldsW.innerHTML=fieldsHTML(curType); bindVF(); if(curType==='occ') wireOcc(); var f=fq('textarea,input',fieldsW); if(f) f.focus(); }
    fa('[data-t]',typesW).forEach(function(b){ b.onclick=function(){ curType=b.dataset.t; fa('button',typesW).forEach(function(x){ x.classList.toggle('on',x===b); }); renderFields(); }; });
    bindVF();
    function val(n){ var el=fq('[data-f="'+n+'"]',fieldsW); return el?el.value.trim():''; }
    function doSave(){

      else if(curType==='vf'){ if(!val('statement')){ ptoast('Atenção','Escreva a afirmação.'); return; } d.statement=val('statement'); d.back=val('back'); var on=fq('.fcx-vf button.on',fieldsW); d.answer=on?(on.dataset.v==='true'):true; }
      else if(curType==='img'){ if(!val('front')){ ptoast('Atenção','Escreva a pergunta.'); return; } d.image=safeUrl(val('image')); d.front=val('front'); d.back=val('back'); }
      else if(curType==='occ'){ if(!safeUrl(val('image'))){ ptoast('Atenção','Cole o link de uma imagem.'); return; } if(!occRect){ ptoast('Atenção','Arraste sobre a imagem para marcar a parte oculta.'); return; } if(!val('back')){ ptoast('Atenção','Escreva a resposta.'); return; } d.image=safeUrl(val('image')); d.occ=occRect; d.back=val('back'); d.front=val('front')||'O que está oculto?'; }
      else { if(!val('front')){ ptoast('Atenção','Preencha a frente do cartão.'); return; } d.front=val('front'); d.back=val('back'); }
      if(!createCard(d)) return;
      occRect=null; renderFields();
      var sv=fq('[data-saved]',panel); if(sv){ sv.classList.add('show'); setTimeout(function(){ sv.classList.remove('show'); },1200); }

  }
  function refresh(panel,id){

  function mountTopic(id){

  }

  /* ---- sessão de revisão ---- */

  }
  function openSession(cards){ cards=(cards||[]).slice(); if(!cards.length){ ptoast('Tudo em dia','Nenhum flashcard para revisar agora.'); return; } SES={q:cards,i:0}; overlay().classList.add('show'); renderSes(); }

  /* ---- Central (FAB) ---- */
  function openCentral(){
    var o=fq('#fcxCentral'); if(!o){ o=document.createElement('div'); o.id='fcxCentral'; o.className='fcx-scrim'; o.innerHTML='<div class="fcx-modal fcx-modal-lg"><button class="fcx-close" type="button">&times;</button><div data-cbody></div></div>'; document.body.appendChild(o); o.addEventListener('click',function(e){ if(e.target===o) o.classList.remove('show'); }); fq('.fcx-close',o).onclick=function(){ o.classList.remove('show'); }; }
    renderCentral(); o.classList.add('show');
  }
  function refreshCentral(){ var o=fq('#fcxCentral'); if(o&&o.classList.contains('show')) renderCentral(); }
  var FLT={mat:'',dif:'',q:''};
  function renderCentral(){
    var o=fq('#fcxCentral'); if(!o) return; var body=fq('[data-cbody]',o);
    var all=arr(), dom=all.filter(mastered).length, pend=all.filter(due).length;
    var rev=all.reduce(function(a,c){return a+(c.reviews||0);},0), cor=all.reduce(function(a,c){return a+(c.correct||0);},0), acc=rev?Math.round(cor/rev*100):0;

    h+='<div class="fcx-tiles"><div class="fcx-tile"><b>'+all.length+'</b><span>no total</span></div><div class="fcx-tile"><b>'+dom+'</b><span>dominados</span></div><div class="fcx-tile"><b>'+pend+'</b><span>pendentes</span></div><div class="fcx-tile"><b>'+acc+'%</b><span>de acerto</span></div></div>';

    h+='<div class="fcx-filters"><select data-fmat><option value="">Todas as matérias</option>'+matOpts+'</select><select data-fdif><option value="">Toda dificuldade</option><option value="novo">Novo</option><option value="dificil">Difícil</option><option value="medio">Médio</option><option value="facil">Fácil</option><option value="dom">Dominado</option></select><input data-fq type="text" placeholder="Buscar no conteúdo..." value="'+esc(FLT.q)+'"></div>';
    h+='<div class="fcx-list" data-clist></div>';

      fa('[data-rev]',list).forEach(function(b){ b.onclick=function(){ var c=UC()[b.dataset.rev]; if(c) openSession([c]); }; });

  function listHTML(f){
    var a=arr().filter(function(c){
      if(f.mat && c.modName!==f.mat) return false;
      if(f.dif){ if(f.dif==='dom'){ if(!mastered(c)) return false; } else { if(mastered(c)) return false; if((c.diff||'novo')!==f.dif) return false; } }
      if(f.q){ var hay=((c.front||'')+' '+(c.back||'')+' '+(c.text||'')+' '+(c.statement||'')+' '+(c.topicTitle||'')).toLowerCase(); if(hay.indexOf(f.q.toLowerCase())<0) return false; }
      return true;
    }).sort(function(x,y){ return (x.due||0)-(y.due||0); });
    if(!a.length) return '<div class="fcx-empty" style="padding:22px">🔍 Nenhum cartão com esses filtros.</div>';
    return a.map(function(c){ var dd=due(c)?'pendente':('em '+Math.max(0,Math.ceil(((c.due||0)-Date.now())/864e5))+'d'); var ac=c.reviews?Math.round((c.correct||0)/c.reviews*100):0;

  }
  function calHTML(){
    var base=new Date(); base.setHours(0,0,0,0); var cards=arr(), wd=['dom','seg','ter','qua','qui','sex','sáb'], h='';
    for(var i=0;i<14;i++){ var ds=base.getTime()+i*864e5, de=ds+864e5; var n=cards.filter(function(c){ var d=c.due||0; return i===0?(d<de):(d>=ds&&d<de); }).length; var dt=new Date(ds); h+='<div class="fcx-d'+(n>0?' has':'')+'"><span>'+wd[dt.getDay()]+'</span><b>'+dt.getDate()+'</b><span>'+(n>0?n:'·')+'</span></div>'; }

  }
