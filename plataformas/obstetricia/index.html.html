<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1016">
<title>OBSTETRÍCIA PRO · Plataforma de Estudos</title>
<style>
/* ===================== DESIGN TOKENS ===================== */
:root{
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
  --radius: 16px; --radius-sm: 11px; --radius-lg: 22px;
  --speed: .28s cubic-bezier(.4,0,.2,1);
  --maxw: 1180px;
  /* brand */
  --brand: #e0497f; --brand2:#7b5cff; --brand3:#1fb6a6;
  --grad-brand: linear-gradient(135deg,#e0497f 0%,#b14ad6 50%,#7b5cff 100%);
  --grad-life: linear-gradient(135deg,#ff7eb3 0%,#ff758c 40%,#ff9a6c 100%);
}
html[data-theme="dark"]{
  --bg:#0b0d13; --bg2:#0e1119; --panel:#141824; --panel2:#1a1f2e; --panel3:#212740;
  --line:#262c3d; --line2:#333b54;
  --txt:#e9edf6; --txt2:#aab3c9; --txt3:#727c96;
  --shadow:0 10px 30px -12px rgba(0,0,0,.7);
  --shadow2:0 24px 60px -20px rgba(0,0,0,.8);
  --hl-y:rgba(245,212,68,.32); --hl-g:rgba(64,214,142,.30); --hl-b:rgba(76,160,255,.30); --hl-p:rgba(240,110,180,.32);
  --ok:#37d39a; --okbg:rgba(55,211,154,.12); --bad:#ff6b6b; --badbg:rgba(255,107,107,.12);
  --warn:#f7b955; --warnbg:rgba(247,185,85,.12); --info:#5aa6ff; --infobg:rgba(90,166,255,.12);
}
html[data-theme="light"]{
  --bg:#f4f5fa; --bg2:#eceef6; --panel:#ffffff; --panel2:#f7f8fc; --panel3:#eef0f8;
  --line:#e4e7f0; --line2:#d2d7e6;
  --txt:#1a1f2e; --txt2:#525c75; --txt3:#8a93a8;
  --shadow:0 10px 30px -14px rgba(40,50,90,.22);
  --shadow2:0 26px 60px -24px rgba(40,50,90,.30);
  --hl-y:rgba(245,205,20,.45); --hl-g:rgba(40,200,120,.32); --hl-b:rgba(60,150,255,.28); --hl-p:rgba(235,90,165,.32);
  --ok:#0fa86e; --okbg:rgba(15,168,110,.12); --bad:#e23b3b; --badbg:rgba(226,59,59,.10);
  --warn:#c98a12; --warnbg:rgba(201,138,18,.12); --info:#2f7fe0; --infobg:rgba(47,127,224,.10);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--font); background:var(--bg); color:var(--txt); line-height:1.62;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden;
  transition:background .4s ease,color .3s ease}
::selection{background:var(--brand); color:#fff}
a{color:var(--brand)}
img{max-width:100%}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2); border-radius:20px; border:2px solid transparent; background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}
::-webkit-scrollbar-track{background:transparent}

/* ===================== LOGIN ===================== */
#login{position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
  padding:24px; background:
    radial-gradient(1200px 600px at 15% -10%, rgba(224,73,127,.22), transparent 60%),
    radial-gradient(1000px 600px at 110% 110%, rgba(123,92,255,.22), transparent 55%),
    var(--bg);
  animation:fade .6s ease}
#login.hide{opacity:0; pointer-events:none; transition:opacity .5s ease}
.login-card{width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius-lg); padding:38px 30px 30px; box-shadow:var(--shadow2); position:relative; overflow:hidden}
.login-card::before{content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--grad-brand)}
.login-logo{display:flex; align-items:center; gap:13px; margin-bottom:6px}
.login-logo .mark{width:50px;height:50px;border-radius:15px;background:var(--grad-brand); display:grid;place-items:center;
  box-shadow:0 10px 24px -8px rgba(224,73,127,.6); flex:0 0 auto}
.login-logo h1{font-size:1.32rem; margin:0; letter-spacing:-.02em; font-weight:800}
.login-logo span{display:block; font-size:.72rem; color:var(--txt2); font-weight:600; letter-spacing:.14em; text-transform:uppercase}
.login-sub{color:var(--txt2); font-size:.92rem; margin:18px 0 22px}
.login-sub b{color:var(--txt)}
.field{position:relative; margin-bottom:14px}
.field input{width:100%; padding:15px 16px; font-size:1rem; background:var(--panel2); border:1.5px solid var(--line);
  border-radius:var(--radius-sm); color:var(--txt); outline:none; transition:var(--speed)}
.field input:focus{border-color:var(--brand); box-shadow:0 0 0 4px rgba(224,73,127,.14)}
.btn-primary{width:100%; padding:15px; font-size:1rem; font-weight:700; color:#fff; border-radius:var(--radius-sm);
  background:var(--grad-brand); box-shadow:0 12px 28px -10px rgba(224,73,127,.6); transition:var(--speed)}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 16px 34px -10px rgba(224,73,127,.7)}
.btn-primary:active{transform:translateY(0)}
.login-foot{margin-top:24px; text-align:center; font-size:.78rem; color:var(--txt3); letter-spacing:.02em}
.login-foot b{color:var(--txt2); font-weight:600}
.login-chips{display:flex; gap:7px; flex-wrap:wrap; margin-top:16px; justify-content:center}
.login-chips span{font-size:.66rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--txt2);
  padding:5px 10px; border:1px solid var(--line); border-radius:30px; background:var(--panel2)}

/* ===================== LAYOUT ===================== */
#app{display:none}
#app.on{display:block}
.topbar{position:sticky; top:0; z-index:80; height:60px; display:flex; align-items:center; gap:12px;
  padding:0 16px; background:color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--line)}
.brand-mini{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:-.02em; font-size:1.02rem}
.brand-mini .mark{width:34px;height:34px;border-radius:10px;background:var(--grad-brand); display:grid;place-items:center; flex:0 0 auto}
.brand-mini b{background:var(--grad-brand); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
.brand-mini small{color:var(--txt3); font-weight:700; font-size:.6rem; letter-spacing:.12em; display:block; margin-top:-3px}
.topbar .spacer{flex:1}
.icon-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--txt2); transition:var(--speed); border:1px solid transparent}
.icon-btn:hover{background:var(--panel2); color:var(--txt); border-color:var(--line)}
.menu-btn{display:none}
.searchbar{flex:1; max-width:440px; position:relative}
.searchbar input{width:100%; height:40px; padding:0 14px 0 40px; background:var(--panel2); border:1px solid var(--line);
  border-radius:30px; color:var(--txt); outline:none; font-size:.9rem; transition:var(--speed)}
.searchbar input:focus{border-color:var(--brand); background:var(--panel)}
.searchbar svg{position:absolute; left:13px; top:11px; color:var(--txt3)}
.search-pop{position:absolute; top:48px; left:0; right:0; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow2); max-height:60vh; overflow:auto; display:none; z-index:90; padding:6px}
.search-pop.on{display:block; animation:pop .2s ease}
.search-pop .res{padding:11px 13px; border-radius:10px; cursor:pointer; display:flex; gap:10px; align-items:center}
.search-pop .res:hover{background:var(--panel2)}
.search-pop .res .t{font-weight:600; font-size:.9rem}
.search-pop .res .m{font-size:.74rem; color:var(--txt3)}
.search-pop .res mark{background:var(--hl-y); color:inherit; border-radius:3px}
.search-empty{padding:18px; text-align:center; color:var(--txt3); font-size:.85rem}

.shell{display:flex; max-width:var(--maxw); margin:0 auto; gap:0}
.sidebar{width:280px; flex:0 0 280px; position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto;
  padding:16px 12px 60px; border-right:1px solid var(--line)}
.side-section{font-size:.66rem; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:var(--txt3);
  padding:14px 12px 6px}
.nav-item{display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:11px; color:var(--txt2);
  font-weight:600; font-size:.9rem; cursor:pointer; transition:var(--speed); position:relative; margin-bottom:1px}
.nav-item:hover{background:var(--panel2); color:var(--txt)}
.nav-item.active{background:var(--panel3); color:var(--txt)}
.nav-item.active::before{content:""; position:absolute; left:-12px; top:9px; bottom:9px; width:3.5px; border-radius:4px; background:var(--grad-brand)}
.nav-item .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center; flex:0 0 auto; font-size:.95rem;
  background:var(--panel2); border:1px solid var(--line)}
.nav-item.active .ic{background:var(--grad-brand); border-color:transparent}
.nav-item .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.nav-item .badge{font-size:.62rem; font-weight:800; padding:2px 7px; border-radius:20px; background:var(--panel2); color:var(--txt3); border:1px solid var(--line)}
.mod-group .nav-item .ic{font-size:.78rem; font-weight:800}

.main{flex:1; min-width:0; padding:26px 30px 90px}
.backdrop{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:75; display:none; opacity:0; transition:.3s}
.backdrop.on{display:block; opacity:1}

/* ===================== GENERIC ===================== */
.view{display:none; animation:fade .4s ease}
.view.on{display:block}
.page-head{margin-bottom:22px}
.page-head .crumb{font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--brand); margin-bottom:8px; display:flex; gap:8px; align-items:center}
.page-head h1{font-size:1.85rem; letter-spacing:-.025em; margin:0 0 6px; font-weight:800; line-height:1.15}
.page-head p{color:var(--txt2); margin:0; font-size:.96rem; max-width:70ch}
.h-row{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.pill{display:inline-flex; align-items:center; gap:6px; font-size:.7rem; font-weight:700; padding:5px 11px; border-radius:30px;
  background:var(--panel2); border:1px solid var(--line); color:var(--txt2); letter-spacing:.02em}
.pill.brand{background:rgba(224,73,127,.12); color:var(--brand); border-color:rgba(224,73,127,.3)}
.yield{display:inline-flex; gap:2px; align-items:center}
.yield i{width:6px;height:11px;border-radius:2px;background:var(--line2); display:inline-block}
.yield i.on{background:var(--brand)}

.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
.grid{display:grid; gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}

/* dashboard */
.stat{padding:20px; position:relative; overflow:hidden}
.stat .lab{font-size:.74rem; font-weight:700; letter-spacing:.04em; color:var(--txt3); text-transform:uppercase}
.stat .num{font-size:2.1rem; font-weight:800; letter-spacing:-.03em; margin-top:4px; line-height:1}
.stat .sub{font-size:.8rem; color:var(--txt2); margin-top:6px}
.stat .ic{position:absolute; right:16px; top:16px; opacity:.5}
.ring{--p:0; width:120px;height:120px; border-radius:50%; display:grid; place-items:center; margin:0 auto;
  background:conic-gradient(var(--brand) calc(var(--p)*1%), var(--panel3) 0)}
.ring::before{content:""; position:absolute; width:92px;height:92px;border-radius:50%; background:var(--panel)}
.ring b{position:relative; font-size:1.5rem; font-weight:800}
.ring small{position:relative; display:block; font-size:.66rem; color:var(--txt3); text-align:center; font-weight:700; letter-spacing:.06em}

.bar{height:9px; border-radius:30px; background:var(--panel3); overflow:hidden}
.bar > i{display:block; height:100%; border-radius:30px; background:var(--grad-brand); transition:width .9s cubic-bezier(.4,0,.2,1)}
.bar.life > i{background:var(--grad-life)}
.bar.thin{height:6px}

.mod-card{padding:18px; cursor:pointer; transition:var(--speed); position:relative; overflow:hidden}
.mod-card:hover{transform:translateY(-3px); box-shadow:var(--shadow2); border-color:var(--line2)}
.mod-card .mc-top{display:flex; align-items:center; gap:12px; margin-bottom:13px}
.mod-card .mc-ic{width:42px;height:42px;border-radius:12px; display:grid;place-items:center; color:#fff; font-weight:800; flex:0 0 auto; font-size:1.05rem}
.mod-card h3{margin:0; font-size:1rem; font-weight:700; letter-spacing:-.01em}
.mod-card .mc-meta{font-size:.76rem; color:var(--txt3); font-weight:600}
.mod-card .mc-foot{display:flex; align-items:center; justify-content:space-between; margin-top:13px; font-size:.74rem; color:var(--txt2); font-weight:600}

/* topic page panels */
.tp-status{display:flex; gap:10px; flex-wrap:wrap; margin:18px 0 22px}
.chk{display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border-radius:30px; font-size:.82rem; font-weight:700;
  border:1.5px solid var(--line); background:var(--panel); color:var(--txt2); cursor:pointer; transition:var(--speed)}
.chk:hover{border-color:var(--line2)}
.chk .dot{width:14px;height:14px;border-radius:50%; border:2px solid var(--txt3); transition:var(--speed)}
.chk.on{border-color:var(--okx,var(--ok)); color:var(--txt); background:var(--okbg)}
.chk.on .dot{background:var(--okx,var(--ok)); border-color:var(--okx,var(--ok))}
.chk[data-k="est"].on{--okx:var(--info)} .chk[data-k="rev"].on{--okx:var(--warn)} .chk[data-k="dom"].on{--okx:var(--ok)}

.panel{margin-bottom:14px; border:1px solid var(--line); border-radius:var(--radius); background:var(--panel); overflow:hidden; box-shadow:var(--shadow)}
.panel > .ph{display:flex; align-items:center; gap:13px; padding:16px 18px; cursor:pointer; user-select:none; transition:background .2s}
.panel > .ph:hover{background:var(--panel2)}
.panel > .ph .pic{width:34px;height:34px;border-radius:10px; display:grid;place-items:center; flex:0 0 auto; font-size:1rem;
  background:var(--panel2); border:1px solid var(--line)}
.panel > .ph .pt{flex:1; font-weight:700; font-size:1rem; letter-spacing:-.01em}
.panel > .ph .pt small{display:block; font-weight:600; font-size:.74rem; color:var(--txt3); letter-spacing:0}
.panel > .ph .chev{color:var(--txt3); transition:transform var(--speed)}
.panel.open > .ph .chev{transform:rotate(90deg)}
.panel > .pb{display:none; padding:4px 20px 22px}
.panel.open > .pb{display:block; animation:slide .35s ease}
.panel.accent-theory > .ph .pic{background:rgba(123,92,255,.14); color:#9d86ff; border-color:transparent}
.panel.accent-flow > .ph .pic{background:rgba(31,182,166,.14); color:#2bd4c0; border-color:transparent}
.panel.accent-table > .ph .pic{background:rgba(90,166,255,.14); color:#5aa6ff; border-color:transparent}
.panel.accent-case > .ph .pic{background:rgba(247,185,85,.14); color:#f7b955; border-color:transparent}
.panel.accent-q > .ph .pic{background:rgba(224,73,127,.14); color:var(--brand); border-color:transparent}
.panel.accent-card > .ph .pic{background:rgba(55,211,154,.14); color:var(--ok); border-color:transparent}
.panel.accent-rev > .ph .pic{background:rgba(90,166,255,.12); color:#5aa6ff; border-color:transparent}
.panel.accent-tip > .ph .pic{background:rgba(247,185,85,.14); color:#f7b955; border-color:transparent}
.panel.accent-err > .ph .pic{background:rgba(255,107,107,.14); color:var(--bad); border-color:transparent}
.panel.accent-chk > .ph .pic{background:rgba(55,211,154,.14); color:var(--ok); border-color:transparent}

/* prose */
.prose{font-size:.96rem; color:var(--txt)}
.prose h3{font-size:1.12rem; margin:24px 0 10px; letter-spacing:-.01em; font-weight:800}
.prose h3:first-child{margin-top:6px}
.prose h4{font-size:.96rem; margin:18px 0 7px; color:var(--brand); font-weight:800; letter-spacing:.01em}
.prose p{margin:9px 0}
.prose ul,.prose ol{margin:9px 0; padding-left:22px}
.prose li{margin:5px 0}
.prose li::marker{color:var(--brand)}
.prose b,.prose strong{color:var(--txt); font-weight:800}
.prose em{color:var(--brand2); font-style:normal; font-weight:700; background:rgba(123,92,255,.1); padding:0 4px; border-radius:4px}
.prose code{font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:.86em; background:var(--panel3); padding:2px 7px; border-radius:6px; color:var(--brand)}
.callout{margin:14px 0; padding:13px 16px 13px 15px; border-radius:12px; border-left:4px solid var(--info); background:var(--infobg); font-size:.9rem}
.callout.warn{border-color:var(--warn); background:var(--warnbg)}
.callout.bad{border-color:var(--bad); background:var(--badbg)}
.callout.ok{border-color:var(--ok); background:var(--okbg)}
.callout .ct{font-weight:800; display:flex; gap:8px; align-items:center; margin-bottom:4px; font-size:.82rem; letter-spacing:.02em; text-transform:uppercase}
.callout.warn .ct{color:var(--warn)} .callout.bad .ct{color:var(--bad)} .callout.ok .ct{color:var(--ok)} .callout .ct{color:var(--info)}

table.t{width:100%; border-collapse:separate; border-spacing:0; font-size:.86rem; margin:8px 0; overflow:hidden; border-radius:12px; border:1px solid var(--line)}
table.t th{background:var(--panel3); padding:11px 13px; text-align:left; font-weight:800; font-size:.78rem; letter-spacing:.02em; color:var(--txt)}
table.t td{padding:10px 13px; border-top:1px solid var(--line); vertical-align:top; color:var(--txt2)}
table.t tr td:first-child{font-weight:700; color:var(--txt)}
.tscroll{overflow-x:auto; -webkit-overflow-scrolling:touch}

/* flowchart svg wrap */
.flow-wrap{display:flex; justify-content:center; padding:6px 0}
.flow-wrap svg{max-width:100%; height:auto}
.mindmap-wrap svg{width:100%; height:auto}

/* clinical case */
.case{border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin:12px 0; background:var(--panel2)}
.case .ctag{font-size:.68rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--warn); margin-bottom:7px}
.case .stem{font-size:.92rem; margin-bottom:10px}
.case .cq{font-weight:700; margin-bottom:8px}
.case .reveal{display:none; margin-top:10px; padding:12px 14px; border-radius:10px; background:var(--okbg); border-left:3px solid var(--ok); font-size:.9rem}
.case .reveal.on{display:block; animation:slide .3s ease}
.btn-sm{font-size:.8rem; font-weight:700; padding:8px 15px; border-radius:9px; background:var(--panel3); color:var(--txt); border:1px solid var(--line); transition:var(--speed)}
.btn-sm:hover{background:var(--panel); border-color:var(--line2)}

/* questions */
.quiz{border:1px solid var(--line); border-radius:14px; padding:18px; margin:14px 0; background:var(--panel)}
.quiz .qn{font-size:.7rem; font-weight:800; letter-spacing:.08em; color:var(--brand); text-transform:uppercase; margin-bottom:9px; display:flex; justify-content:space-between}
.quiz .qstem{font-size:.95rem; font-weight:600; margin-bottom:14px}
.opt{display:flex; gap:11px; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px; margin-bottom:8px; cursor:pointer; transition:var(--speed); font-size:.9rem; align-items:flex-start}
.opt:hover{border-color:var(--line2); background:var(--panel2)}
.opt .lt{width:24px;height:24px;border-radius:7px; background:var(--panel3); display:grid;place-items:center; font-weight:800; font-size:.8rem; flex:0 0 auto; transition:var(--speed)}
.opt.correct{border-color:var(--ok); background:var(--okbg)} .opt.correct .lt{background:var(--ok); color:#fff}
.opt.wrong{border-color:var(--bad); background:var(--badbg)} .opt.wrong .lt{background:var(--bad); color:#fff}
.opt.dim{opacity:.55}
.opt.locked{cursor:default}
.expl{display:none; margin-top:6px; padding:14px 16px; border-radius:12px; background:var(--panel2); border:1px solid var(--line); font-size:.88rem; animation:slide .3s ease}
.expl.on{display:block}
.expl .eh{font-weight:800; color:var(--ok); margin-bottom:6px; display:flex; gap:7px; align-items:center; font-size:.82rem; text-transform:uppercase; letter-spacing:.04em}
.expl .just{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
.expl .just .ji{margin:5px 0; font-size:.84rem; color:var(--txt2)}
.expl .just .ji b{color:var(--bad)}
.quiz-foot{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap}

/* flashcards */
.fc-deck{margin:8px 0}
.fc-stage{perspective:1600px; margin:0 auto; max-width:560px}
.flashcard{position:relative; min-height:200px; cursor:pointer; transform-style:preserve-3d; transition:transform .6s cubic-bezier(.4,0,.2,1)}
.flashcard.flip{transform:rotateY(180deg)}
.fc-face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:var(--radius);
  padding:26px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; border:1px solid var(--line); box-shadow:var(--shadow)}
.fc-front{background:var(--panel)}
.fc-front .tag{font-size:.66rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--brand); margin-bottom:12px}
.fc-front .q{font-size:1.12rem; font-weight:700; letter-spacing:-.01em}
.fc-back{background:linear-gradient(160deg,var(--panel2),var(--panel)); transform:rotateY(180deg)}
.fc-back .tag{font-size:.66rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--ok); margin-bottom:12px}
.fc-back .a{font-size:1rem; font-weight:600; color:var(--txt)}
.fc-hint{text-align:center; font-size:.74rem; color:var(--txt3); margin-top:12px}
.fc-ctrl{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:16px}
.fc-ctrl .pos{font-size:.82rem; font-weight:700; color:var(--txt2); min-width:64px; text-align:center}
.fc-nav{width:44px;height:44px;border-radius:12px; background:var(--panel); border:1px solid var(--line); display:grid;place-items:center; color:var(--txt); transition:var(--speed)}
.fc-nav:hover{background:var(--panel3); border-color:var(--line2)}
.fc-rate{display:flex; gap:8px; justify-content:center; margin-top:12px}
.fc-rate button{font-size:.78rem; font-weight:700; padding:8px 14px; border-radius:9px; border:1px solid var(--line); transition:var(--speed)}
.fc-rate .hard{color:var(--bad)} .fc-rate .hard:hover{background:var(--badbg); border-color:var(--bad)}
.fc-rate .good{color:var(--ok)} .fc-rate .good:hover{background:var(--okbg); border-color:var(--ok)}

/* lists */
.tlist{list-style:none; padding:0; margin:6px 0}
.tlist li{display:flex; gap:11px; padding:9px 0; border-bottom:1px solid var(--line); font-size:.9rem; align-items:flex-start}
.tlist li:last-child{border-bottom:none}
.tlist li .bullet{width:22px;height:22px;border-radius:7px; flex:0 0 auto; display:grid; place-items:center; font-size:.7rem; font-weight:800; margin-top:1px}
.tlist.tip li .bullet{background:var(--warnbg); color:var(--warn)}
.tlist.err li .bullet{background:var(--badbg); color:var(--bad)}
.tlist.mac li .bullet{background:rgba(123,92,255,.14); color:var(--brand2)}
.tlist.rev li .bullet{background:var(--infobg); color:var(--info)}
.check-final{list-style:none; padding:0; margin:6px 0}
.check-final li{display:flex; gap:11px; padding:11px 13px; border:1px solid var(--line); border-radius:11px; margin-bottom:7px; cursor:pointer; transition:var(--speed); font-size:.9rem; align-items:center; background:var(--panel)}
.check-final li:hover{border-color:var(--line2)}
.check-final li .box{width:21px;height:21px;border-radius:7px; border:2px solid var(--txt3); flex:0 0 auto; display:grid; place-items:center; transition:var(--speed)}
.check-final li.done{background:var(--okbg); border-color:var(--ok)}
.check-final li.done .box{background:var(--ok); border-color:var(--ok); color:#fff}
.check-final li.done .ctxt{text-decoration:line-through; color:var(--txt3)}

/* notes + highlight toolbar */
.notes-area{width:100%; min-height:120px; resize:vertical; padding:14px 16px; border:1.5px solid var(--line); border-radius:12px;
  background:var(--panel2); color:var(--txt); font-family:inherit; font-size:.92rem; line-height:1.6; outline:none; transition:var(--speed)}
.notes-area:focus{border-color:var(--brand2); background:var(--panel)}
.note-status{font-size:.74rem; color:var(--txt3); margin-top:7px; font-weight:600}
.hl-toolbar{position:fixed; z-index:160; display:none; gap:6px; padding:7px; background:var(--panel); border:1px solid var(--line2);
  border-radius:30px; box-shadow:var(--shadow2)}
.hl-toolbar.on{display:flex; animation:pop .15s ease}
.hl-toolbar .sw{width:26px;height:26px;border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s}
.hl-toolbar .sw:hover{transform:scale(1.18)}
.hl-toolbar .sw.y{background:#f5d444} .hl-toolbar .sw.g{background:#40d68e} .hl-toolbar .sw.b{background:#4ca0ff} .hl-toolbar .sw.p{background:#f06eb4}
.hl-toolbar .sw.x{background:var(--panel3); display:grid;place-items:center; color:var(--txt2); border-color:var(--line)}
mark.hl{border-radius:3px; padding:.5px 0; cursor:pointer}
mark.hl-y{background:var(--hl-y)} mark.hl-g{background:var(--hl-g)} mark.hl-b{background:var(--hl-b)} mark.hl-p{background:var(--hl-p)}

/* daily / goals */
.seg{display:flex; gap:6px; background:var(--panel2); padding:5px; border-radius:13px; border:1px solid var(--line); width:fit-content}
.seg button{padding:8px 16px; border-radius:9px; font-weight:700; font-size:.84rem; color:var(--txt2); transition:var(--speed)}
.seg button.on{background:var(--panel); color:var(--txt); box-shadow:var(--shadow)}
.goal-row{display:flex; align-items:center; gap:16px; padding:16px 0; border-bottom:1px solid var(--line)}
.goal-row:last-child{border-bottom:none}
.goal-row .gl{flex:1}
.goal-row .gl b{font-size:.95rem} .goal-row .gl small{display:block; color:var(--txt3); font-size:.78rem}
.goal-num{font-size:1.4rem; font-weight:800; letter-spacing:-.02em}
.stepper{display:flex; align-items:center; gap:8px}
.stepper button{width:30px;height:30px;border-radius:9px; background:var(--panel3); border:1px solid var(--line); font-weight:800; font-size:1.1rem; color:var(--txt); display:grid;place-items:center}
.empty-state{text-align:center; padding:50px 20px; color:var(--txt3)}
.empty-state .es-ic{font-size:2.4rem; margin-bottom:10px}

/* journey */
.journey-hero{padding:24px; text-align:center; position:relative; overflow:hidden}
.journey-stage{max-width:520px; margin:0 auto}
.milestones{display:flex; flex-wrap:wrap; gap:8px; margin-top:18px; justify-content:center}
.ms{display:flex; align-items:center; gap:8px; padding:8px 13px; border-radius:30px; font-size:.78rem; font-weight:700;
  border:1px solid var(--line); background:var(--panel2); color:var(--txt3)}
.ms.reached{color:var(--txt); border-color:var(--brand); background:rgba(224,73,127,.08)}
.ms.reached .mdot{background:var(--grad-life)}
.ms .mdot{width:9px;height:9px;border-radius:50%; background:var(--line2)}
.timeline{position:relative; margin:24px 0 0; padding-left:26px}
.timeline::before{content:""; position:absolute; left:8px; top:6px; bottom:6px; width:2px; background:var(--line)}
.tl-item{position:relative; padding:0 0 22px}
.tl-item::before{content:""; position:absolute; left:-22px; top:4px; width:14px;height:14px; border-radius:50%; background:var(--panel); border:2.5px solid var(--line2)}
.tl-item.on::before{background:var(--grad-life); border-color:transparent; box-shadow:0 0 0 4px rgba(255,118,140,.18)}
.tl-item .tlp{font-size:.7rem; font-weight:800; color:var(--brand); letter-spacing:.06em}
.tl-item h4{margin:3px 0 4px; font-size:.98rem}
.tl-item p{margin:0; font-size:.85rem; color:var(--txt2)}
.confetti{position:fixed; inset:0; pointer-events:none; z-index:190}

/* backup */
.code-box{width:100%; min-height:120px; padding:14px; border:1.5px solid var(--line); border-radius:12px; background:var(--panel2);
  color:var(--txt2); font-family:ui-monospace,Menlo,monospace; font-size:.78rem; word-break:break-all; resize:vertical; outline:none}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); z-index:300; background:var(--txt); color:var(--bg);
  padding:13px 22px; border-radius:30px; font-weight:700; font-size:.88rem; box-shadow:var(--shadow2); opacity:0; transition:.35s; pointer-events:none}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

/* fab progress (mobile journey peek) */
.mini-life{display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:13px; background:var(--panel2); border:1px solid var(--line); margin-bottom:18px}
.mini-life .me{font-size:1.5rem} .mini-life .ml{flex:1} .mini-life .ml b{font-size:.86rem} .mini-life .ml small{color:var(--txt3); font-size:.74rem; display:block}

/* animations */
@keyframes fade{from{opacity:0} to{opacity:1}}
@keyframes pop{from{opacity:0; transform:scale(.96) translateY(-4px)} to{opacity:1; transform:none}}
@keyframes slide{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}
@keyframes floaty{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
@keyframes confdrop{to{transform:translateY(105vh) rotate(720deg); opacity:0}}

/* ===================== RESPONSIVE ===================== */
@media(max-width:920px){
  .g4{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:780px){
  .menu-btn{display:grid}
  .sidebar{position:fixed; top:0; left:0; height:100vh; z-index:78; background:var(--bg2); transform:translateX(-105%);
    transition:transform var(--speed); box-shadow:var(--shadow2); padding-top:18px; width:300px; flex-basis:300px}
  .sidebar.on{transform:none}
  .main{padding:18px 16px 90px}
  .searchbar{max-width:none}
  .brand-mini small{display:none}
  .page-head h1{font-size:1.5rem}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .stat .num{font-size:1.8rem}
}
@media(max-width:480px){
  .topbar{padding:0 12px; gap:8px}
  .brand-mini .lbltxt{display:none}
  .login-card{padding:30px 22px 24px}
  .panel > .pb{padding:4px 14px 18px}
}
@media(min-width:781px){ .menu-btn{display:none} }

<style id="premium-enhance">
/* ===== PALETA OBSTÉTRICA PREMIUM (override aditivo) ===== */
:root{ --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --brand:#d6488a; --brand2:#9a5cd0; --brand3:#15b6a6;
  --grad-brand:linear-gradient(135deg,#e0568f 0%,#b455c9 50%,#8a5cf0 100%);
  --grad-life:linear-gradient(135deg,#ff8fb3 0%,#ff7aa0 45%,#ffa477 100%); }
html[data-theme="dark"]{ --bg:#150f1c; --bg2:#1b1426; --panel:#221a2e; --panel2:#2a2038; --panel3:#352a48;
  --line:#3a2d4e; --line2:#4b3b63; --txt:#f4eef9; --txt2:#c6b8d6; --txt3:#9285a6;
  --shadow:0 12px 32px -14px rgba(0,0,0,.7); --shadow2:0 28px 64px -22px rgba(40,10,50,.85); }
html[data-theme="light"]{ --bg:#faf5fc; --bg2:#f2e9f7; --panel:#ffffff; --panel2:#faf4fc; --panel3:#f2e7f8;
  --line:#ecdff2; --line2:#dcc9e6; --txt:#2a1f33; --txt2:#62546f; --txt3:#9686a4;
  --shadow:0 12px 30px -16px rgba(120,40,120,.18); --shadow2:0 28px 60px -24px rgba(120,40,120,.26); }
body{ background:
  radial-gradient(1100px 720px at 10% -10%, rgba(214,72,138,.12), transparent 60%),
  radial-gradient(1000px 720px at 110% 6%, rgba(154,92,208,.12), transparent 55%),
  radial-gradient(900px 700px at 50% 120%, rgba(21,182,166,.07), transparent 60%),
  var(--bg) !important; background-attachment:fixed !important; }
/* tipografia premium */
.page-head h1,.login-logo h1,.prose h3,.fc-front .q,.ring b,.stat .num,.goal-num,.gate-title,.ah-t{ font-family:'Sora',var(--font); }
.prose p,.prose li{ line-height:1.7; }
.prose h3{ letter-spacing:-.015em; }
/* glass + profundidade */
.glass{ background:color-mix(in srgb, var(--panel) 80%, transparent) !important; -webkit-backdrop-filter:saturate(170%) blur(16px); backdrop-filter:saturate(170%) blur(16px); border:1px solid color-mix(in srgb,var(--line) 60%,#ffffff14); }
.topbar{ background:color-mix(in srgb,var(--bg) 72%,transparent) !important; }
.sidebar{ -webkit-backdrop-filter:saturate(160%) blur(12px); backdrop-filter:saturate(160%) blur(12px); }
.card,.panel,.mod-card{ transition:transform .28s cubic-bezier(.4,0,.2,1),box-shadow .28s,border-color .28s; }
.card:hover{ border-color:color-mix(in srgb,var(--brand) 35%,var(--line)); }
.mod-card:hover{ box-shadow:0 24px 54px -24px rgba(214,72,138,.5) !important; transform:translateY(-4px); }
.nav-item{ transition:background .25s,color .25s,transform .15s; }
.nav-item:hover{ transform:translateX(2px); }
.stat::after{ content:""; position:absolute; inset:0; border-radius:inherit; background:radial-gradient(420px 120px at 100% 0,rgba(214,72,138,.10),transparent 60%); pointer-events:none; }
/* barra de progresso de navegação */
#navbar-prog{ position:fixed; top:0; left:0; height:3px; width:0; z-index:250; background:var(--grad-brand); box-shadow:0 0 12px rgba(214,72,138,.6); opacity:0; }
#navbar-prog.run{ animation:navp .65s ease forwards; }
@keyframes navp{ 0%{width:0;opacity:1} 60%{width:82%;opacity:1} 100%{width:100%;opacity:0} }
/* skeleton (microinteração) */
.skeleton{ background:linear-gradient(90deg,var(--panel2) 25%,var(--panel3) 37%,var(--panel2) 63%); background-size:400% 100%; animation:sk 1.3s ease infinite; border-radius:10px; }
@keyframes sk{ 0%{background-position:100% 0} 100%{background-position:-100% 0} }
/* ===== GATE DE ACESSO ===== */
#gate{ position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; padding:24px;
  background:radial-gradient(1000px 600px at 20% -10%,rgba(214,72,138,.25),transparent 60%),radial-gradient(900px 600px at 110% 110%,rgba(154,92,208,.25),transparent 55%),var(--bg); }
#gate.hide{ opacity:0; pointer-events:none; transition:opacity .45s ease; }
.gate-card{ width:100%; max-width:430px; border-radius:24px; padding:40px 32px 30px; text-align:center; box-shadow:var(--shadow2); position:relative; overflow:hidden; }
.gate-card::before{ content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--grad-brand); }
.gate-badge{ display:inline-block; font-size:.64rem; font-weight:800; letter-spacing:.18em; color:var(--brand); background:rgba(214,72,138,.12); border:1px solid rgba(214,72,138,.3); padding:6px 13px; border-radius:30px; margin-bottom:16px; }
.gate-title{ font-size:1.7rem; font-weight:800; margin:0 0 4px; letter-spacing:-.02em; }
.gate-title span{ background:var(--grad-brand); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-left:6px; }
.gate-sub{ color:var(--txt2); font-size:.92rem; margin:0 0 22px; }
#gate input{ width:100%; padding:15px 16px; font-size:1rem; background:var(--panel2); border:1.5px solid var(--line); border-radius:13px; color:var(--txt); outline:none; transition:.25s; text-align:center; letter-spacing:.05em; }
#gate input:focus{ border-color:var(--brand); box-shadow:0 0 0 4px rgba(214,72,138,.14); }
#gate button{ width:100%; margin-top:14px; padding:15px; font-size:1rem; font-weight:700; color:#fff; border-radius:13px; background:var(--grad-brand); box-shadow:0 14px 30px -10px rgba(214,72,138,.6); transition:.25s; }
#gate button:hover{ transform:translateY(-2px); }
.gate-err{ color:var(--bad); font-size:.82rem; font-weight:600; margin-top:12px; min-height:18px; }
.gate-foot{ margin-top:22px; font-size:.76rem; color:var(--txt3); }
.gate-foot b{ color:var(--txt2); }
.shake{ animation:shk .4s; }
@keyframes shk{ 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
/* ===== CRÉDITO DA AUTORA ===== */
.author-hero{ display:flex; align-items:center; gap:16px; padding:18px 22px; border-radius:18px; margin:0 0 18px; border:1px solid var(--line); box-shadow:var(--shadow); }
.author-hero .ah-l{ flex:1; }
.author-hero .ah-badge{ display:inline-block; font-size:.62rem; font-weight:800; letter-spacing:.14em; color:var(--brand); background:rgba(214,72,138,.12); padding:4px 10px; border-radius:20px; }
.author-hero .ah-t{ font-size:1.15rem; font-weight:800; margin-top:8px; letter-spacing:-.01em; }
.author-hero .ah-t b{ background:var(--grad-brand); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.author-hero .ah-s{ font-size:.84rem; color:var(--txt2); margin-top:2px; }
.author-hero .ah-r{ font-size:2.2rem; filter:drop-shadow(0 6px 14px rgba(214,72,138,.4)); }
.app-credit{ margin:40px auto 0; text-align:center; font-size:.78rem; color:var(--txt3); padding:18px 0; border-top:1px solid var(--line); letter-spacing:.02em; }
.app-credit b{ color:var(--txt2); font-weight:700; }
/* ===== SIDEBAR PREMIUM ===== */
.sb-head{ display:flex; align-items:center; gap:8px; padding:6px 12px 14px; }
.sb-brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:.98rem; letter-spacing:-.02em; flex:1; }
.sb-brand .sb-mark{ width:26px; height:26px; border-radius:9px; background:var(--grad-brand); box-shadow:0 6px 14px -4px rgba(214,72,138,.6); flex:0 0 auto; }
.sb-brand b{ font-family:'Sora',var(--font); }
.sb-brand small{ color:var(--txt3); font-weight:700; font-size:.58rem; letter-spacing:.12em; }
.sb-collapse{ width:28px; height:28px; border-radius:9px; background:var(--panel2); border:1px solid var(--line); color:var(--txt2); font-weight:800; transition:.25s; }
.sb-collapse:hover{ background:var(--panel3); color:var(--txt); }
.sb-foot{ margin-top:22px; padding:16px 12px; font-size:.72rem; color:var(--txt3); text-align:center; border-top:1px solid var(--line); line-height:1.5; }
.sb-foot b{ background:var(--grad-brand); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; font-size:.82rem; }
body.sb-collapsed .sidebar{ width:76px; flex-basis:76px; }
body.sb-collapsed .sidebar .lbl,body.sb-collapsed .sidebar .badge,body.sb-collapsed .side-section,body.sb-collapsed .sb-foot,body.sb-collapsed .sb-brand b,body.sb-collapsed .sb-brand small{ display:none; }
body.sb-collapsed .sb-collapse{ transform:rotate(180deg); }
body.sb-collapsed .nav-item{ justify-content:center; }
/* ===== FAVORITAR ===== */
.fav-btn{ font-size:.78rem; font-weight:700; padding:7px 14px; border-radius:30px; border:1.5px solid var(--line); background:var(--panel); color:var(--txt2); transition:.25s; margin-left:auto; }
.fav-btn:hover{ border-color:var(--brand); color:var(--brand); }
.fav-btn.on{ background:rgba(214,72,138,.12); border-color:var(--brand); color:var(--brand); }
/* ===== CONQUISTAS ===== */
.ach{ position:relative; transition:transform .25s,box-shadow .25s; }
.ach.on{ box-shadow:0 18px 40px -20px rgba(214,72,138,.5); }
.ach.off{ opacity:.62; filter:grayscale(.5); }
.ach:hover{ transform:translateY(-4px); }
.ach-ic{ font-size:2.3rem; }
.ach-t{ font-weight:800; margin-top:6px; font-family:'Sora',var(--font); }
.ach-s{ font-size:.8rem; color:var(--txt2); margin-top:2px; }

.ach.on .ach-badge{ background:var(--okbg); color:var(--ok); }
.ach.off .ach-badge{ background:var(--panel3); color:var(--txt3); }
</style>

<script>
/* =========================================================
   OBSTETRÍCIA PRO — Engine
   ========================================================= */
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const slug=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

/* ---------- STATE ---------- */
const App={
  user:null, theme:'dark',
  state:{ checks:{}, finals:{}, notes:{}, highlights:{}, answered:{}, cards:{}, hardCards:[], goals:{day:0,week:0,month:0,ts:''}, journeySeen:0 },
  flat:[], // flattened topics
};
function keyFor(){ return 'obsterPRO::'+(App.user||'guest'); }
function save(){ try{ localStorage.setItem(keyFor(), JSON.stringify(App.state)); }catch(e){} try{ if(typeof cloudSave==='function') cloudSave(); }catch(e){} }
function load(){
  try{ const r=localStorage.getItem(keyFor()); if(r) App.state=Object.assign(App.state,JSON.parse(r)); }catch(e){}
  if(!App.state.goals) App.state.goals={day:0,week:0,month:0,ts:''};
}

/* ---------- THEME ---------- */
function setTheme(t){
  App.theme=t; document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('obsterPRO_theme',t); }catch(e){}
  $('#themeBtn').innerHTML = t==='dark'
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8Z"/></svg>';
  const meta=$('meta[name=theme-color]'); if(meta) meta.content = t==='dark'?'#0b0d13':'#f4f5fa';
}

/* ---------- ICONS ---------- */
const IC={
  dash:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  daily:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2 4.5 13H11l-1 9 8.5-11H12l1-9Z"/></svg>',
  journey:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 21s-6-4-6-9a6 6 0 0 1 12 0c0 5-6 9-6 9Z"/><circle cx="12" cy="11" r="2"/></svg>',
  goals:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>',
  backup:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M8 8l4-4 4 4"/><path d="M4 16v2.5A1.5 1.5 0 0 0 5.5 20h13a1.5 1.5 0 0 0 1.5-1.5V16"/></svg>',
  ranking:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 21V11M12 21V4M18 21v-7"/></svg>'
};
const PANELDEF=[
  {k:'theory', t:'Resumo Teórico Completo', s:'Conceitos · fisiopatologia · conduta', ic:'📖', cls:'accent-theory'},
  {k:'flow', t:'Fluxogramas de Conduta', s:'Algoritmos de decisão (SVG)', ic:'🧭', cls:'accent-flow'},
  {k:'tables', t:'Tabelas Comparativas', s:'Diferenciais lado a lado', ic:'▦', cls:'accent-table'},
  {k:'mind', t:'Mapa Mental / Diagrama', s:'Visão integrada do tema', ic:'🕸', cls:'accent-flow'},
  {k:'cases', t:'Casos Clínicos', s:'Raciocínio clínico guiado', ic:'🩺', cls:'accent-case'},
  {k:'questions', t:'Questões Comentadas', s:'Gabarito + justificativas', ic:'✍️', cls:'accent-q'},
  {k:'cards', t:'Flashcards', s:'Pergunta → vira → resposta', ic:'🃏', cls:'accent-card'},
  {k:'review', t:'Revisão Rápida', s:'O essencial em 60 segundos', ic:'⚡', cls:'accent-rev'},
  {k:'tips', t:'Dicas de Prova', s:'O que as bancas cobram', ic:'💡', cls:'accent-tip'},
  {k:'mnemonics', t:'Macetes & Mnemônicos', s:'Para não esquecer', ic:'🧠', cls:'accent-card'},
  {k:'errors', t:'Erros Frequentes', s:'Pegadinhas clássicas', ic:'⚠️', cls:'accent-err'},
  {k:'checklist', t:'Checklist Final', s:'Confira antes da prova', ic:'✅', cls:'accent-chk'}
];

/* ---------- SVG FLOWCHART GENERATOR ---------- */
function wrapText(t, max){
  const words=(t||'').split(' '); const lines=[]; let cur='';
  words.forEach(w=>{ if((cur+' '+w).trim().length>max){ if(cur)lines.push(cur); cur=w; } else cur=(cur+' '+w).trim(); });
  if(cur)lines.push(cur); return lines;
}
/* nodes: {t:'start'|'step'|'decision'|'yes'|'no'|'end', x:'text', tone:'good'|'bad'|'warn'|''} */
function flow(nodes){
  const W=360, pad=14, cw=W-pad*2, lh=16, fs=12.5;
  const tone=(n)=>{
    if(n.t==='start')return{f:'var(--brand)',tx:'#fff',b:'var(--brand)'};
    if(n.t==='decision')return{f:'var(--panel3)',tx:'var(--txt)',b:'var(--brand2)'};
    if(n.t==='yes')return{f:'var(--okbg)',tx:'var(--txt)',b:'var(--ok)'};
    if(n.t==='no')return{f:'var(--badbg)',tx:'var(--txt)',b:'var(--bad)'};
    if(n.t==='end'){
      if(n.tone==='bad')return{f:'var(--badbg)',tx:'var(--txt)',b:'var(--bad)'};
      if(n.tone==='warn')return{f:'var(--warnbg)',tx:'var(--txt)',b:'var(--warn)'};
      return{f:'var(--okbg)',tx:'var(--txt)',b:'var(--ok)'};
    }
    return{f:'var(--panel2)',tx:'var(--txt)',b:'var(--line2)'};
  };
  // layout
  let y=8, parts=[], conn=[];
  const measure=n=>{
    const label=(n.t==='yes'?'SE SIM  ·  ':n.t==='no'?'SE NÃO  ·  ':'');
    const lines=wrapText(label+n.x, n.t==='decision'?34:40);
    return Math.max(40, lines.length*lh+18);
  };
  nodes.forEach((n,i)=>{ n._h=measure(n); n._y=y; y+=n._h+(i<nodes.length-1?22:0); });
  const H=y+10;
  nodes.forEach((n,i)=>{
    const c=tone(n), h=n._h, label=(n.t==='yes'?'SE SIM · ':n.t==='no'?'SE NÃO · ':'');
    const lines=wrapText(label+n.x, n.t==='decision'?34:40);
    const isDec=n.t==='decision';
    const rx=isDec?20:11;
    parts.push(`<g>`);
    parts.push(`<rect x="${pad}" y="${n._y}" width="${cw}" height="${h}" rx="${rx}" fill="${c.f}" stroke="${c.b}" stroke-width="1.6"/>`);
    if(n.t!=='start'&&n.t!=='end'&&!isDec){
      parts.push(`<rect x="${pad}" y="${n._y}" width="4" height="${h}" rx="2" fill="${c.b}"/>`);
    }
    const ty=n._y+h/2-(lines.length-1)*lh/2;
    lines.forEach((ln,j)=>{
      const bold=(label&&j===0)?' font-weight="800"':' font-weight="600"';
      parts.push(`<text x="${W/2}" y="${ty+j*lh+4.5}" text-anchor="middle" font-size="${fs}" fill="${c.tx}"${bold} font-family="var(--font)">${esc(ln)}</text>`);
    });
    parts.push(`</g>`);
    if(i<nodes.length-1){
      const y1=n._y+h, y2=nodes[i+1]._y;
      conn.push(`<line x1="${W/2}" y1="${y1}" x2="${W/2}" y2="${y2-7}" stroke="var(--line2)" stroke-width="1.8"/>`);
      conn.push(`<path d="M${W/2-4},${y2-9} L${W/2},${y2-3} L${W/2+4},${y2-9}" fill="var(--line2)"/>`);
    }
  });
  return `<div class="flow-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" xmlns="http://www.w3.org/2000/svg" role="img">${conn.join('')}${parts.join('')}</svg></div>`;
}

/* ---------- MIND MAP GENERATOR (radial) ---------- */
function mindmap(center, branches){
  const W=380, H=Math.max(220, 90+branches.length*0); const cx=W/2;
  const n=branches.length; const rowH=46; const top=70; const totalH=top+n*rowH+20;
  let s=`<div class="mindmap-wrap"><svg viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;
  // center node
  const clines=wrapText(center,18);
  const ch=Math.max(46, clines.length*16+16);
  s+=`<rect x="${cx-78}" y="${20}" width="156" height="${ch}" rx="14" fill="var(--brand)" />`;
  clines.forEach((l,i)=>s+=`<text x="${cx}" y="${20+ch/2-(clines.length-1)*8+i*16+4}" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">${esc(l)}</text>`);
  branches.forEach((b,i)=>{
    const y=top+i*rowH+ch; const left=i%2===0; const bx=left?16:W-176; const bw=160;
    const col=['#7b5cff','#1fb6a6','#5aa6ff','#f7b955','#e0497f','#37d39a'][i%6];
    s+=`<line x1="${cx}" y1="${20+ch}" x2="${left?bx+bw:bx}" y2="${y+18}" stroke="${col}" stroke-width="1.8" opacity=".55"/>`;
    const blines=wrapText(b,22); const bh=Math.max(34,blines.length*15+12);
    s+=`<rect x="${bx}" y="${y}" width="${bw}" height="${bh}" rx="10" fill="var(--panel2)" stroke="${col}" stroke-width="1.5"/>`;
    s+=`<rect x="${bx}" y="${y}" width="4" height="${bh}" rx="2" fill="${col}"/>`;
    blines.forEach((l,j)=>s+=`<text x="${bx+bw/2+2}" y="${y+bh/2-(blines.length-1)*7.5+j*15+4}" text-anchor="middle" font-size="11.5" font-weight="600" fill="var(--txt)">${esc(l)}</text>`);
  });
  s+=`</svg></div>`; return s;
}

/* ---------- TABLE HELPER ---------- */
function tbl(headers, rows){
  let h='<div class="tscroll"><table class="t"><thead><tr>'+headers.map(x=>`<th>${x}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{ h+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; });
  return h+'</tbody></table></div>';
}

/* ---------- BUILD FLAT INDEX ---------- */
function buildIndex(){
  App.flat=[];
  MODULES.forEach(m=> (m.topics||[]).forEach(t=>{ t._mod=m; App.flat.push(t); }));
}
function topicById(id){ return App.flat.find(t=>t.id===id); }

/* ---------- PROGRESS ---------- */
function topicScore(t){ // 0..3
  const c=App.state.checks[t.id]||{}; let s=0; if(c.est)s++; if(c.rev)s++; if(c.dom)s++; return s;
}
function topicPct(t){ return topicScore(t)/3; }
function moduleProgress(m){
  const ts=m.topics||[]; if(!ts.length) return 0;
  let s=0; ts.forEach(t=>s+=topicPct(t)); return Math.round(s/ts.length*100);
}
function overallPct(){
  if(!App.flat.length) return 0;
  let s=0; App.flat.forEach(t=>s+=topicPct(t)); return Math.round(s/App.flat.length*100);
}
function counts(){
  let dom=0,rev=0,est=0,started=0;
  App.flat.forEach(t=>{const c=App.state.checks[t.id]||{}; if(c.dom)dom++; if(c.rev)rev++; if(c.est)est++; if(c.est||c.rev||c.dom)started++;});
  return {dom,rev,est,started,total:App.flat.length};
}
function modStatus(m){ const p=moduleProgress(m); return p>=100?'Concluído':p>0?'Em andamento':'Não iniciado'; }

/* boot is in later script after content + views */
</script>
<script>
/* =========================================================
   VIEWS / RENDERING
   ========================================================= */
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2200); }

/* ---------- SIDEBAR ---------- */
function renderSidebar(){
  const sb=$('#sidebar'); sb.innerHTML='';
  const nav=[
    {id:'dashboard', t:'Dashboard', ic:IC.dash},
    {id:'daily', t:'Estudos do Dia', ic:IC.daily},
    {id:'journey', t:'Minha Jornada', ic:IC.journey},
    {id:'goals', t:'Metas', ic:IC.goals},
    {id:'ranking', t:'Temas + Cobrados', ic:IC.ranking},
    {id:'backup', t:'Backup', ic:IC.backup},
  ];
  sb.appendChild(el('div','side-section','Navegação'));
  nav.forEach(n=>{
    const it=el('div','nav-item','<span class="ic">'+n.ic+'</span><span class="lbl">'+n.t+'</span>');
    it.dataset.go=n.id; it.onclick=()=>go(n.id);
    sb.appendChild(it);
  });
  sb.appendChild(el('div','side-section','Módulos · Obstetrícia'));
  const grp=el('div','mod-group');
  MODULES.forEach(m=>{
    const p=moduleProgress(m);
    const it=el('div','nav-item');
    it.dataset.go='mod:'+m.id;
    it.innerHTML='<span class="ic" style="background:'+m.color+';color:#fff;border-color:transparent">'+(m.tag||m.num)+'</span><span class="lbl">'+esc(m.title)+'</span><span class="badge">'+p+'%</span>';
    it.onclick=()=>go('mod:'+m.id);
    grp.appendChild(it);
  });
  sb.appendChild(grp);
}
function setActive(route){
  $$('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.go===route));
}

/* ---------- ROUTER ---------- */
function go(route, sub){
  App.route=route;
  closeDrawer();
  if(route.startsWith('mod:')){ renderModule(route.slice(4)); setActive(route); }
  else if(route.startsWith('topic:')){ renderTopic(route.slice(6)); setActive('mod:'+(topicById(route.slice(6))||{})._mod?.id); }
  else {
    ({dashboard:renderDashboard,daily:renderDaily,journey:renderJourney,goals:renderGoals,backup:renderBackup,ranking:renderRanking}[route]||renderDashboard)();
    setActive(route);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const m=$('#main'); const pct=overallPct(); const c=counts();
  const stage=journeyStage(pct);
  let modCards='';
  MODULES.forEach(mo=>{
    const p=moduleProgress(mo); const st=modStatus(mo);
    const stcol=p>=100?'var(--ok)':p>0?'var(--warn)':'var(--txt3)';
    modCards+=`<div class="card mod-card" onclick="go('mod:${mo.id}')">
      <div class="mc-top"><div class="mc-ic" style="background:${mo.color}">${mo.tag||mo.num}</div>
      <div><h3>${esc(mo.title)}</h3><div class="mc-meta">${(mo.topics||[]).length} tópicos · ${st}</div></div></div>
      <div class="bar thin"><i style="width:${p}%"></i></div>
      <div class="mc-foot"><span style="color:${stcol}">${p}% completo</span><span>${(mo.topics||[]).length} temas</span></div></div>`;
  });
  m.innerHTML=`
  <div class="page-head">
    <div class="crumb">Painel principal</div>
    <h1>Olá, ${esc(App.user)} 👋</h1>
    <p>Bem-vinda à sua plataforma premium de Obstetrícia. Continue de onde parou e acompanhe sua evolução rumo à aprovação.</p>
  </div>
  <div class="grid g4" style="margin-bottom:16px">
    <div class="card stat"><div class="lab">Progresso geral</div><div class="num">${pct}%</div><div class="sub">${c.started}/${c.total} tópicos iniciados</div></div>
    <div class="card stat"><div class="lab">Dominados</div><div class="num" style="color:var(--ok)">${c.dom}</div><div class="sub">temas com domínio total</div></div>
    <div class="card stat"><div class="lab">Revisados</div><div class="num" style="color:var(--warn)">${c.rev}</div><div class="sub">prontos para revisão final</div></div>
    <div class="card stat"><div class="lab">Pendentes</div><div class="num" style="color:var(--txt3)">${c.total-c.started}</div><div class="sub">ainda não iniciados</div></div>
  </div>
  <div class="grid g3" style="margin-bottom:24px; grid-template-columns:1.2fr .9fr .9fr">
    <div class="card" style="padding:22px"><div class="lab" style="font-size:.74rem;font-weight:700;letter-spacing:.04em;color:var(--txt3);text-transform:uppercase;margin-bottom:14px">Conclusão por módulo</div>
      ${MODULES.map(mo=>{const p=moduleProgress(mo);return `<div style="display:flex;align-items:center;gap:11px;margin:9px 0"><div style="width:8px;height:8px;border-radius:3px;background:${mo.color};flex:0 0 auto"></div><div style="flex:1;font-size:.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(mo.title)}</div><div style="width:90px"><div class="bar thin"><i style="width:${p}%"></i></div></div><div style="font-size:.78rem;font-weight:700;color:var(--txt2);width:34px;text-align:right">${p}%</div></div>`;}).join('')}
    </div>
    <div class="card" style="padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
      <div style="position:relative" class="ring" style="--p:${pct}"><div class="ring" style="--p:${pct};position:relative"><b>${pct}%</b><small>GERAL</small></div></div>
      <div style="font-weight:700;margin-top:14px">Rumo à aprovação</div>
      <div style="font-size:.8rem;color:var(--txt2)">${c.dom} de ${c.total} dominados</div>
    </div>
    <div class="card" style="padding:22px;cursor:pointer" onclick="go('journey')">
      <div class="lab" style="font-size:.74rem;font-weight:700;letter-spacing:.04em;color:var(--txt3);text-transform:uppercase;margin-bottom:8px">Jornada da Vida</div>
      <div style="text-align:center;font-size:3rem;animation:floaty 3.5s ease-in-out infinite">${stage.emoji}</div>
      <div style="text-align:center;font-weight:800;margin-top:4px">${stage.label}</div>
      <div class="bar life" style="margin-top:12px"><i style="width:${pct}%"></i></div>
      <div style="font-size:.78rem;color:var(--txt2);text-align:center;margin-top:8px">${pct}% da gestação do conhecimento →</div>
    </div>
  </div>
  <div class="page-head" style="margin-bottom:14px"><h1 style="font-size:1.25rem">Módulos</h1></div>
  <div class="grid g3">${modCards}</div>`;
  // animate rings (set var)
  $$('.ring').forEach(r=>{ const p=r.style.getPropertyValue('--p'); r.style.setProperty('--p',0); requestAnimationFrame(()=>setTimeout(()=>r.style.setProperty('--p',p),60)); });
}

/* ---------- MODULE ---------- */
function renderModule(id){
  const mo=MODULES.find(x=>x.id===id); if(!mo) return renderDashboard();
  const m=$('#main'); const p=moduleProgress(mo);
  let tps='';
  (mo.topics||[]).forEach(t=>{
    const sc=topicScore(t); const pc=Math.round(topicPct(t)*100);
    const stcol=sc===3?'var(--ok)':sc>0?'var(--warn)':'var(--txt3)';
    const stl=sc===3?'Dominado':sc===2?'Revisado':sc===1?'Em andamento':'Não iniciado';
    const yd=yieldDots(t.yield||3);
    tps+=`<div class="card mod-card" onclick="go('topic:${t.id}')">
      <div class="mc-top"><div class="mc-ic" style="background:${mo.color}">${IC2(t)}</div>
      <div style="flex:1"><h3>${esc(t.title)}</h3><div class="mc-meta">${(t.questions||[]).length} questões · ${(t.cards||[]).length} flashcards</div></div></div>
      <div style="display:flex;align-items:center;gap:8px;margin:2px 0 10px">${yd}<span style="font-size:.7rem;color:var(--txt3);font-weight:700;margin-left:auto">${stl}</span></div>
      <div class="bar thin"><i style="width:${pc}%"></i></div></div>`;
  });
  m.innerHTML=`
  <div class="page-head">
    <div class="crumb"><span style="cursor:pointer" onclick="go('dashboard')">Início</span> › Módulo ${mo.num}</div>
    <h1>${esc(mo.title)}</h1>
    <p>${esc(mo.subtitle||'')}</p>
    <div class="h-row" style="margin-top:14px">
      <span class="pill brand">Módulo ${mo.num}</span>
      <span class="pill">${(mo.topics||[]).length} tópicos</span>
      <span class="pill">${p}% completo</span>
    </div>
    <div class="bar" style="margin-top:14px;max-width:520px"><i style="width:${p}%"></i></div>
  </div>

/* ---------- QUIZ ---------- */
function quizHTML(q,tid,i){
  const L=['A','B','C','D','E','F'];
  const ans=(App.state.answered[tid]||{})[i];
  let opts='';
  q.opts.forEach((o,j)=>{
    let cls='opt locked';
    if(ans!=null){ if(j===q.correct)cls+=' correct'; else if(j===ans)cls+=' wrong'; else cls+=' dim'; }
    else cls='opt';
    opts+=`<div class="${cls}" onclick="answer('${tid}',${i},${j},this)"><span class="lt">${L[j]}</span><span>${o}</span></div>`;
  });
  const show=ans!=null?' on':'';
  let just='';
  if(q.justif){ just='<div class="just">'+Object.keys(q.justif).map(k=>`<div class="ji"><b>${L[k]} incorreta:</b> ${q.justif[k]}</div>`).join('')+'</div>'; }
  return `<div class="quiz" data-qi="${i}"><div class="qn"><span>Questão ${i+1}</span><span>${esc(q.src||'')}</span></div>
    <div class="qstem">${q.q}</div><div class="opts">${opts}</div>
    <div class="expl${show}"><div class="eh">✓ Gabarito: ${L[q.correct]}</div><div>${q.expl}</div>${just}</div></div>`;
}
function answer(tid,i,j,node){
  const a=App.state.answered[tid]||(App.state.answered[tid]={});
  if(a[i]!=null) return;
  a[i]=j; save();
  const quiz=node.closest('.quiz');
  $$('.opt',quiz).forEach((o,k)=>{ o.classList.add('locked'); if(k===App._cor) {} });
  const q=topicById(tid).questions[i];
  $$('.opt',quiz).forEach((o,k)=>{ if(k===q.correct)o.classList.add('correct'); else if(k===j)o.classList.add('wrong'); else o.classList.add('dim'); });
  $('.expl',quiz).classList.add('on');
  if(j===q.correct) toast('Resposta correta! 🎯'); else toast('Resposta registrada');
  bumpGoal('q');
}

function seededPick(arr,n,seed){ // deterministic per-day pick
  const a=arr.slice(); let s=seed; const out=[];
  while(a.length&&out.length<n){ s=(s*9301+49297)%233280; const idx=Math.floor(s/233280*a.length); out.push(a.splice(idx,1)[0]); }
  return out;
}

function goalTarget(k,d){ const g=App.state.goals; g.targets=g.targets||{day:20,week:120,month:450}; g.targets[k]=Math.max(10,g.targets[k]+d); save(); renderGoals(); }
function estimateETA(){
  const c=counts(); const remaining=(c.total*3)-(c.dom*3+( c.rev-c.dom )*2 + (c.est-c.rev) );
  const perDay=Math.max(1,App.state.goals.day||3);
  // rough: each topic needs 3 marks; assume few marks/day
  const left=c.total-c.dom; if(left<=0) return 'Concluído 🎉';
  const days=Math.ceil(left/Math.max(1,Math.round(perDay/4)));
  if(days>120) return '~'+Math.round(days/30)+' meses';
  return '~'+days+' dias';
}

/* ---------- HIGHLIGHTER ---------- */
let hlRange=null, hlNode=null;
function initHighlighter(){
  const bar=$('#hlbar');
  document.addEventListener('mouseup',onSelect); document.addEventListener('touchend',onSelect);
  bar.querySelectorAll('.sw').forEach(sw=>sw.addEventListener('mousedown',e=>{e.preventDefault(); applyHL(sw.dataset.c);}));
  bar.querySelectorAll('.sw').forEach(sw=>sw.addEventListener('touchstart',e=>{e.preventDefault(); applyHL(sw.dataset.c);},{passive:false}));
  document.addEventListener('mousedown',e=>{ if(!bar.contains(e.target)&&!e.target.classList.contains('hl')) bar.classList.remove('on'); });
}
function onSelect(e){
  const bar=$('#hlbar'); const sel=window.getSelection();
  if(e.target&&e.target.classList&&e.target.classList.contains('hl')){ // click existing -> offer remove
    hlNode=e.target; const r=e.target.getBoundingClientRect();
    bar.style.left=Math.max(8,Math.min(window.innerWidth-180,r.left+r.width/2-90))+'px'; bar.style.top=(r.top-46+window.scrollY)+'px';
    bar.classList.add('on'); hlRange=null; return;
  }
  if(!sel||sel.isCollapsed||!sel.toString().trim()){ return; }
  const host=sel.anchorNode&&(sel.anchorNode.nodeType===1?sel.anchorNode:sel.anchorNode.parentElement).closest('[data-hl]');
  if(!host){ bar.classList.remove('on'); return; }
  hlRange=sel.getRangeAt(0).cloneRange(); hlNode=null;
  const r=hlRange.getBoundingClientRect();
  bar.style.left=Math.max(8,Math.min(window.innerWidth-180,r.left+r.width/2-90))+'px'; bar.style.top=(r.top-46+window.scrollY)+'px';
  bar.classList.add('on');
}
function applyHL(c){
  const bar=$('#hlbar');
  if(hlNode){ // remove existing highlight
    const parent=hlNode.parentNode; while(hlNode.firstChild) parent.insertBefore(hlNode.firstChild,hlNode); parent.removeChild(hlNode); parent.normalize();
    bar.classList.remove('on'); saveHighlights(); return;
  }
  if(c==='x'){ bar.classList.remove('on'); return; }
  if(!hlRange) return;
  try{
    const mark=el('mark','hl hl-'+c); mark.appendChild(hlRange.extractContents()); hlRange.insertNode(mark);
    window.getSelection().removeAllRanges();
  }catch(e){}
  bar.classList.remove('on'); saveHighlights();
}

function saveHighlights(){

  const t=currentTopicId(); if(!t) return;

  App.state.highlights[t]=blocks; save();
}
function applyHighlights(tid){

  $$('[data-hl]').forEach(b=>{ const k=b.dataset.hl; if(k&&saved[k]) b.innerHTML=saved[k]; });

/* ---------- SEARCH ---------- */
function doSearch(q){
  const pop=$('#searchPop'); q=q.trim().toLowerCase();
  if(!q){ pop.classList.remove('on'); return; }
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const nq=norm(q);
  const res=[];
  App.flat.forEach(t=>{
    const hay=norm(t.title+' '+(t.tags||[]).join(' ')+' '+(t.sections?.review||[]).join(' ')+' '+(t.search||''));
    if(hay.includes(nq)) res.push(t);
  });
  if(!res.length){ pop.innerHTML='<div class="search-empty">Nada encontrado para "'+esc(q)+'"</div>'; pop.classList.add('on'); return; }
  pop.innerHTML=res.slice(0,12).map(t=>{
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    const title=esc(t.title).replace(re,'<mark>$1</mark>');
    return `<div class="res" onmousedown="go('topic:${t.id}');$('#searchPop').classList.remove('on');$('#search').value=''"><div class="mc-ic" style="width:30px;height:30px;font-size:.8rem;background:${t._mod.color}">${IC2(t)}</div><div><div class="t">${title}</div><div class="m">${esc(t._mod.title)}</div></div></div>`;
  }).join('');
  pop.classList.add('on');
}

    theory:`
<h3>Princípio geral</h3>
<p>A gestante "vive por dois": aumenta volume, débito e filtração para nutrir o feto. A <b>progesterona</b> é a grande responsável (PRÓ-gestar) — relaxa musculatura lisa em vários sistemas.</p>
<h3>1. Cardiovascular</h3>
<p>A placenta funciona como <b>fístula arteriovenosa</b> → <b>queda da RVP</b> → tendência à queda da PA (sobretudo diastólica, 2º trimestre). Compensação: <b>débito cardíaco ↑40-50%</b> e <b>FC ↑10-15 bpm</b>.</p>
<div class="callout"><div class="ct">Ponte com pré-eclâmpsia</div>Se as invasões trofoblásticas <b>não</b> ocorrem, a RVP permanece alta → a PA <em>sobe</em> em vez de cair no 2º trimestre → pré-eclâmpsia. Entender o normal é entender o patológico.</div>
<p>Síndromes: <b>hipercinética</b> (sopro <b>sistólico</b> fisiológico — cuidado com sopro <em>diastólico</em>, que investiga!), <b>hipotensão supina</b>, risco de <b>EAP no puerpério imediato</b> em cardiopatas (auto-transfusão pós-dequitação).</p>
<h3>2. Respiratória</h3>
<p><b>Hiperventila</b> (↑ventilação-minuto) → <b>↓pCO₂</b> → <b>alcalose respiratória compensada</b> pela ↓bicarbonato. ↑consumo e PO₂; <b>↓capacidade residual funcional</b> (útero eleva o diafragma). FR e ausculta ~inalteradas — "dispneia fisiológica" pela ↓pCO₂.</p>
<h3>3. Hematológica</h3>
<p><b>Volume plasmático ↑40-50%</b> e <b>massa eritrocitária ↑20-30%</b> → <b>anemia dilucional</b>. <b>Leucocitose</b> fisiológica. Estado <b>pró-coagulante</b>: ↑fibrinogênio e fatores VII, VIII, IX, vW; ↓fibrinólise.</p>
<div class="callout warn"><div class="ct">Tríade de Virchow</div>Gestante já tem <b>hipercoagulabilidade</b> e, ao dequitar, <b>lesão endotelial</b>. Falta só a <b>estase</b> → profilaxia universal = <b>deambulação precoce</b>.</div>
<h3>4. Metabólica — estado diabetogênico</h3>
<p>↑contrainsulínicos (<b>hPL</b>, cortisol) → <b>resistência periférica à insulina</b> (poupa glicose ao feto, que passa por <b>difusão facilitada</b>) → <b>hiperinsulinismo compensatório</b>. Pâncreas "fraco" não compensa → <b>diabetes gestacional</b>.</p>
<h3>5. Renal e urinária</h3>
<p><b>TFG ↑50%</b> → <b>ureia/creatinina caem</b>; <b>glicosúria fisiológica</b>. ↑reabsorção de sódio (<b>hiperaldosteronismo secundário</b>). Progesterona dilata ureter/pelve (mais à direita — dextrorrotação) → <b>hidronefrose fisiológica direita</b> e ↑risco de ITU (rastrear bacteriúria assintomática).</p>
<h3>6. Gastrointestinal e osteoarticular</h3>
<p>↓peristaltismo (constipação), ↓tônus esofagiano (pirose/refluxo), ↓esvaziamento gástrico, ↓contração da vesícula (litíase). <b>Lordose lombar</b>, <b>marcha anserina</b>, <b>relaxamento articular</b> (progesterona).</p>`,

    theory:`
<h3>Calendário de consultas</h3>
<p>Mínimo de <b>6 consultas</b> (MS); o ideal é mensal até 28s, quinzenal de 28-36s e semanal após 36s. <b>Não existe alta de pré-natal</b>: se passar de 41 semanas, orientar buscar a maternidade (induzir) para não chegar ao pós-termo.</p>
<div class="callout"><div class="ct">Gesta e Para</div><b>GESTA</b> = número de gestações (conta ectópica, aborto, mola). <b>PARA</b> = partos/nascimentos &gt; 20 semanas. <b>Gemelar não dobra</b> gesta nem para (1 gestação, 1 parto).</div>
<h3>Exame físico</h3>
<p><b>Altura uterina</b> acompanha o crescimento — de <b>18 a 30 semanas, AU ≈ IG</b>. AU muito acima → macrossomia/polidrâmnio/gemelar; muito abaixo → CIUR/oligodrâmnio. <b>Manobras de Leopold</b> definem situação, apresentação e foco de ausculta na 2ª metade.</p>
<h3>Exames — mnemônico T.E.S.T.A.R.</h3>
<ul>
<li><b>T</b> — <b>Tipagem</b> sanguínea e Rh (+ Coombs indireto se Rh negativo);</li>
<li><b>E</b> — <b>EAS</b> + urocultura (bacteriúria assintomática);</li>
<li><b>S</b> — <b>Sexuais</b>: HIV, sífilis (teste rápido + VDRL), HBsAg, HCV; HTLV na 1ª rotina (2024);</li>
<li><b>T</b> — <b>Toxoplasmose</b> (IgM/IgG);</li>
<li><b>A</b> — <b>Anemia</b> (hemograma) + <b>Açúcar</b> (glicemia de jejum, corte <b>92</b>);</li>
<li><b>R</b> — <b>Repetir</b> no 3º trimestre (EAS, urocultura, sorologias).</li>
</ul>
<p>2ª rotina (24-28s): <b>TOTG 75g</b> (VR 92/180/153), USGTV com colo, ecocardiograma fetal. Sempre que internar para parto/aborto, repetir sífilis, HIV e HTLV.</p>
<h3>Suplementação</h3>
<p><b>Ácido fólico</b> 0,4 mg/dia (1-3 meses antes até fim do 1º tri) — previne defeitos de fechamento do tubo neural; alto risco (filho prévio acometido, anticonvulsivante, diabética) usa dose maior. <b>Sulfato ferroso</b> profilático (40 mg Fe elementar/dia) a partir da 20ª semana se Hb &gt; 11; se Hb 8-11 dose terapêutica; Hb &lt; 8 → pré-natal de alto risco. <b>Não tomar ferro junto com cálcio</b> (intervalo de 2h); tomar com suco ácido (vit. C).</p>`,

    theory:`
<h3>Definição</h3>
<p><b>PA ≥ 140×90 mmHg</b> (confirmada em 4h) <b>+ proteinúria</b> (≥300 mg/24h, ou relação proteína/creatinina ≥0,3, ou 1+ na fita) <b>após 20 semanas</b>. A proteinúria de 24h é o padrão-ouro.</p>
<div class="callout"><div class="ct">Pré-eclâmpsia sem proteinúria</div>HAS &gt;20 semanas <b>+</b> um dos: plaquetas &lt;100.000, creatinina &gt;1,1, EAP, transaminases 2× o normal, sintomas cerebrais/visuais. A proteinúria <b>não</b> é mais obrigatória.</div>
<h3>Fisiopatologia</h3>
<p>Falha das <b>ondas de invasão trofoblástica</b> (1ª no 1º tri, 2ª em 16-20s) → artérias espiraladas continuam de pequeno calibre e <b>alta resistência</b> → ↑RVP → ↑PA a partir de 20s. Lesão endotelial libera <b>tromboxano</b> (↑, vasoconstritor) e ↓prostaciclina, com agregação plaquetária. No rim: <b>endoteliose capilar glomerular</b> (explica a proteinúria).</p>
<h3>Fatores de risco e prevenção</h3>
<p><b>Alto risco</b>: pré-eclâmpsia prévia, gemelar/mola (exposição excessiva à placenta), vasculopatia (HAS, DM, LES, nefropatia). Prevenção (só alto risco): <b>AAS 100-150 mg</b> iniciado entre <b>12-16 semanas</b> + <b>cálcio 1,5 g</b> (se baixa ingesta).</p>
<h3>Classificação de gravidade</h3>
<p><b>Grave</b> se: PAS ≥160 ou PAD ≥110 (mesmo assintomática); EAP; oligúria; <b>HELLP</b>; iminência de eclâmpsia (cefaleia, escotomas, epigastralgia, hiperreflexia). Uma vez grave, <b>não volta</b> a ser leve.</p>
<h3>Conduta</h3>

<h3>Sulfato de magnésio — prevenção/tratamento da eclâmpsia</h3>
<p>Indicado em <b>toda pré-eclâmpsia grave</b> e na <b>eclâmpsia</b>. Na eclâmpsia: proteger via aérea + sulfato de Mg. Em prova, pré-eclâmpsia grave sem Mg na alternativa = risque.</p>
<h4>Esquemas (saber as doses!)</h4>
<ul>
<li><b>Pritchard:</b> ataque 4g IV + 10g IM; manutenção 5g IM 4/4h;</li>
<li><b>Zuspan (preferido):</b> ataque 4g IV; manutenção 1g/h IV em bomba.</li>
</ul>
<p>Ataque IV sempre <b>lento (~20 min)</b>. Manter por <b>24h</b> (após o parto ou se não interromper).</p>
<h4>Monitorização (depuração renal)</h4>
<p>Acompanhar <b>reflexo patelar</b>, <b>FR</b> e <b>diurese</b> (&gt;25 mL/h). <b>1º sinal de intoxicação = abolição do reflexo patelar</b> → depois ↓FR → parada. Se reflexo abolido ou FR baixa: <b>suspender Mg + gluconato de cálcio 1g (antídoto)</b>. Oligúria isolada = risco de intoxicação → ajustar a manutenção (não suspender).</p>
<h3>Crise × manutenção</h3>
<p><b>Crise (PA ≥160×110):</b> hidralazina IV (1ª escolha), nifedipina VO. <b>Manutenção (crônica):</b> metildopa, hidralazina VO, pindolol, anlodipino. <b>Proibidos:</b> iECA e BRA.</p>`,

<p>Tríade: <b>atraso menstrual + dor abdominal + sangramento</b>, com <b>útero vazio ao USG</b> e/ou <b>β-hCG &gt;1500 sem saco intraútero</b>. <b>Ectópica rota</b> = abdome agudo hemorrágico: Blumberg+, <b>sinal de Proust</b> (dor no fundo de saco / "grito de Douglas"), choque.</p>

<h3>2. Rotura de vasa prévia</h3>
<p>Rotura de <b>vasos desprotegidos</b> entre a apresentação e o colo (FR: <b>inserção velamentosa do cordão</b>). <b>Sangramento súbito após amniorrexe + sofrimento fetal agudo</b> (hemorragia de origem <b>fetal</b>). Conduta: <b>cesárea</b> de urgência.</p>
<h3>3. Rotura uterina</h3>
<p>Pontos de fragilidade (cicatriz, multípara, trabalho de parto obstruído). <b>Iminência (síndrome de Bandl-Frommel):</b> <b>sinal de Bandl</b> (útero em ampulheta, anel separa corpo/segmento) + <b>sinal de Frommel</b> (ligamentos redondos retesados). <b>Rotura consumada:</b> dor lancinante → <b>cessação súbita da dor</b>, <b>sinal de Clark</b> (crepitação), <b>sinal de Reasens</b> (subida da apresentação), fácil palpação fetal.</p>

<h3>Conceito</h3>
<p>Mãe <b>Rh negativo</b> sensibilizada produz <b>anti-D</b> contra hemácias fetais Rh positivo. A incompatibilidade <b>ABO</b> é a mais comum (leve, sem profilaxia); a <b>Rh</b> é a mais grave (tem profilaxia). A doença <b>piora a cada gestação</b>.</p>
<h3>Seguimento (mãe Rh negativo)</h3>
<p><b>Coombs indireto</b> no 1º trimestre. Negativo → repetir mensal a partir de 28s. Positivo → ver titulação: <b>&lt;1:16</b> repetir mensal; <b>≥1:16</b> → <b>investigar anemia fetal</b>.</p>
<h3>Investigação de anemia fetal</h3>
<p><b>Doppler da artéria cerebral média</b> (não invasivo): pico sistólico &gt;1,5 MoM = anemia. Se <b>&lt;34s → cordocentese</b> (padrão-ouro dx e tto, com <b>transfusão intrauterina</b>); se <b>≥34s → resolver a gestação</b>.</p>
<h3>Imunoglobulina anti-D</h3>
<p>Indicação (mãe Rh− não sensibilizada): qualquer <b>sangramento</b> (aborto, ectópica, DPP, PP), <b>exame invasivo</b> (amniocentese), ou <b>pós-parto de RN Rh+</b>. <b>Idealmente até 72h</b> (pode até 28 dias). Também recomendada na <b>28ª semana</b> se Coombs negativo. Só aplicar se Coombs indireto <b>negativo</b>.</p>`,

<h3>Trajeto mole × duro</h3>
<p><b>Mole:</b> segmento inferior, colo, vagina, região vulvoperineal (raramente dá problema). <b>Duro:</b> ossos ilíacos, sacro, cóccix, púbis — é o que importa na pelvimetria.</p>
<h3>Estreitos e diâmetros</h3>
<ul>
<li><b>Estreito superior — Conjugata obstétrica</b> (menor espaço real): borda interna do púbis ao promontório. Deve ter <b>&gt;10,5 cm</b>. Medimos indiretamente pela <b>conjugata diagonal</b> (subtraímos 1,5 cm).</li>
<li><b>Estreito médio — diâmetro biisquiático</b> (espinhas isquiáticas) = <b>plano 0 de DeLee</b> (insinuação).</li>

<h3>Os conceitos</h3>
<ul>
<li><b>Situação:</b> maior eixo fetal × uterino — longitudinal (comum), transversa, oblíqua;</li>
<li><b>Apresentação:</b> cefálica (comum), pélvica, córmica (acrômio, situação transversa — cesárea);</li>
<li><b>Atitude:</b> relação das partes fetais entre si — <b>flexão generalizada</b> é o ideal;</li>
<li><b>Posição:</b> lado do dorso; <b>variedade de posição:</b> ponto de referência fetal × bacia materna.</li>
</ul>
<h3>Apresentação cefálica e deflexões</h3>
<ul>
<li><b>Fletida</b> (toca <b>lambda</b>/occipital, menor diâmetro suboccipitobregmático) — ideal;</li>
<li><b>Deflexão 1º grau</b> (bregma);</li>
<li><b>Deflexão 2º grau</b> (naso/glabela) — <b>pior prognóstico, cesárea</b>;</li>
<li><b>Deflexão 3º grau</b> (mento/face) — mento anterior pode nascer; <b>mento posterior = cesárea</b>. A apresentação facial simula parto pélvico.</li>
</ul>
<h3>Variedade de posição</h3>
<p>Ex.: toco lambda (occipital), occipital à direita e anterior → <b>ODA</b>. <b>OP</b> (occipito-púbica) é perfeita para nascer. Variedade transversa exige <b>grande rotação</b> (90°).</p>`,

  sections:{
    theory:`
<h3>Parâmetros da contração</h3>
<p><b>Tônus</b> (basal ~10 mmHg), <b>frequência</b> (contrações/10 min), <b>intensidade</b> (pico, mmHg), <b>duração</b> (s), <b>atividade uterina</b> (Unidade de Montevidéu = intensidade × frequência). <b>Tríplice gradiente descendente:</b> contração começa e é mais forte no fundo, propaga-se para baixo.</p>
<h3>Fases (motor)</h3>
<p><b>Dilatação:</b> 2-3 contrações/10min, 30-40s. <b>Expulsivo:</b> 5-6 contrações/10min, 60-80s.</p>
<h3>Discinesias</h3>
<ul>
<li><b>Quantitativas:</b> hipoatividade (hipossistolia &lt;25 mmHg, bradissistolia &lt;2/10min) e hiperatividade (hipersistolia &gt;50 mmHg, <b>taquissistolia &gt;5/10min → risco de SFA</b>); hipertonia (taquissistolia, incoordenação, sobredistensão, "autêntica" do DPP);</li>
<li><b>Qualitativas:</b> inversão do tríplice gradiente, incoordenação uterina (1º e 2º grau).</li>
</ul>
<p><b>Tratamento:</b> hipoatividade → ocitocina, amniotomia; hiperatividade/hipertonia → suspender uterotônicos, decúbito lateral esquerdo, analgesia, tocolítico.</p>`,

    theory:`
<h3>Períodos clínicos</h3>
<ul>
<li><b>1º (dilatação):</b> deambulação, acompanhante, dieta leve, ausculta a cada 15-30 min, toque a cada 4h (depois 2h). <b>Não fazer:</b> enteróclise, tricotomia, toques desnecessários, amniotomia de rotina;</li>
<li><b>2º (expulsivo):</b> dilatação total à expulsão. Primípara até 2h (3h com analgesia); multípara 1h (2h com analgesia). Manobra de <b>Ritgen modificada</b>, <b>clampeamento tardio (1 min)</b>, posição escolhida pela mulher. <b>Não:</b> episiotomia de rotina, manobra de <b>Kristeller</b> (violência obstétrica);</li>
<li><b>3º (secundamento):</b> conduta ativa — <b>ocitocina 10 UI IM</b>, tração controlada (Brandt-Andrews), revisão do canal;</li>
<li><b>4º (Greenberg):</b> 1ª hora pós-parto — vigiar hemorragia (miotamponagem = globo de segurança de Pinard).</li>
</ul>
<h3>Partograma</h3>
<p>Registro gráfico. <b>Linha de alerta</b> traçada no quadrado ao lado do 1º triângulo da fase ativa; <b>linha de ação</b> 4h depois. Diagnósticos: <b>fase ativa prolongada</b> (&lt;1cm/h por &gt;2h, causa hipocontratilidade → ocitocina), <b>parada secundária da dilatação</b> (≥2h sem progredir; se motor bom → <b>DCP → cesárea</b>), <b>período pélvico prolongado</b>, <b>parada secundária da descida</b> e <b>parto taquitócico</b> (&lt;4h).</p>`,

  sections:{
    theory:`
<h3>Distócia de ombro</h3>
<p>Ombro anterior impactado na sínfise ("osso no osso"). <b>Pare de tracionar</b> (risco de Erb/fratura). Sequência: <b>chamar ajuda → McRoberts</b> (hiperflexão + abdução das coxas) <b>+ pressão suprapúbica</b> (Rubin I); se falhar, manobras internas (<b>Rubin II</b>, <b>Woods</b>), <b>Jacquemier</b> (retirar braço posterior), <b>Gaskin</b> (4 apoios); resgate: fratura de clavícula, <b>Zavanelli</b>.</p>
<h3>Fórceps</h3>
<ul>
<li><b>Simpson</b> — o mais comum, qualquer variedade exceto transversa, rotação ≤45°;</li>
<li><b>Piper</b> — cabeça derradeira (parto pélvico);</li>
<li><b>Kielland</b> — variedades transversas, grandes rotações, corrige assinclitismo.</li>
</ul>
<p><b>Critérios de aplicabilidade:</b> dilatação total, pelve proporcional, livre canal, <b>insinuação (DeLee positivo)</b>, conhecer a variedade, amniotomia, reto/bexiga vazios. Pegada ideal: <b>biparietomalomentoniana</b>. <b>Fórceps alto (DeLee negativo) é proibido</b>. <b>Vácuo-extrator (Kiwi):</b> couro cabeludo visível; <b>não usar &lt;34s</b>.</p>`,

<h3>Cardiotocografia (CTG)</h3>
<ul>
<li><b>Linha de base:</b> 110-160 bpm (taqui &gt;160, bradi &lt;110);</li>
<li><b>Variabilidade:</b> moderada 6-25 (boa); mínima &lt;5; ausente; <b>sinusoidal</b> (anemia fetal grave);</li>
<li><b>Aceleração:</b> ↑15 bpm por 15s (bem-estar); reativo = 2 acelerações/20 min;</li>
<li><b>Desacelerações (DIP):</b> <b>DIP I</b> (precoce/cefálico, coincide com a contração — normal); <b>DIP II</b> (tardio, após a contração — <b>insuficiência placentária/SFA</b>); <b>DIP III</b> (variável/umbilical — compressão de cordão).</li>
</ul>
<h3>Categorias</h3>
<p><b>Categoria I:</b> tranquilizador (acompanhar). <b>Categoria II:</b> intermediário (repetir CTG ou PBF). <b>Categoria III:</b> patológico — <b>perda de variabilidade + DIP II / DIP III de repetição / bradicardia</b> → <b>parto o mais rápido possível</b> (fórceps se critério, ou cesárea).</p>
<h3>Perfil biofísico fetal (PBF)</h3>
<p>CTG + 4 parâmetros do USG (líquido, movimento, movimento respiratório, tônus), 0-2 cada (máx 10, sem ímpar). <b>1ª alteração = CTG/BCF</b> (mais sensível); <b>última = líquido amniótico</b> (crônico).</p>`,
