<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELID</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500;600&family=Great+Vibes:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-gold: #b76e79;
      --champagne: #f7e7ce;
      --deep-plum: #2d1b2e;
      --soft-mauve: #c9a0b0;
      --ivory: #faf6f0;
    }
    body { font-family: 'Raleway', sans-serif; box-sizing: border-box; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    .font-script { font-family: 'Great Vibes', cursive; }

    canvas#bg-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .glass {
      background: rgba(45, 27, 46, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(183, 110, 121, 0.15);
    }
    .letter-highlight { color: var(--rose-gold); font-weight: 500; }

    @keyframes scaleInGentle {
      0%   { opacity: 0; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInFromLeft {
      0%   { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .view-transition { animation: scaleInGentle 0.55s cubic-bezier(0.34, 1.3, 0.64, 1) both; }

    .btn-access {
      background: linear-gradient(135deg, var(--rose-gold), var(--soft-mauve));
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      position: relative; overflow: hidden;
    }
    .btn-access:hover {
      box-shadow: 0 0 35px rgba(183,110,121,0.55), 0 10px 22px rgba(183,110,121,0.3);
      transform: translateY(-3px) scale(1.015);
    }
    .btn-access:active { transform: translateY(0) scale(0.99); }

    .input-field {
      background: rgba(250,246,240,0.05);
      border: 1px solid rgba(183,110,121,0.3);
      color: var(--ivory);
      transition: border-color 0.35s ease, box-shadow 0.45s ease, background 0.35s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--rose-gold);
      box-shadow: 0 0 0 1px rgba(183,110,121,0.4), inset 0 0 14px rgba(183,110,121,0.18), 0 0 18px rgba(183,110,121,0.25);
      background: rgba(250,246,240,0.08);
    }
    .input-field::placeholder { color: rgba(250,246,240,0.35); }

    .toast {
      position: fixed; bottom: 2rem; left: 2rem;
      padding: 0.75rem 1.5rem; border-radius: 10px; z-index: 100;
      animation: slideInFromLeft 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .toast-error { background: rgba(180,60,60,0.92); color: #fff; }
    .toast-success { background: rgba(110,160,110,0.9); color: #fff; }

    #gate-view, #auth-view { transition: opacity 0.4s ease, transform 0.4s ease; }
  </style>
</head>
<body class="h-full overflow-auto" style="background: var(--deep-plum);">
  <canvas id="bg-canvas"></canvas>

  <div id="app" class="relative z-10 h-full flex items-center justify-center p-6">

    <!-- Landing View -->
    <div id="landing-view" class="text-center max-w-lg w-full">
      <div class="mb-4">
        <span class="text-xs tracking-[0.4em] uppercase" style="color:var(--soft-mauve);font-weight:300;word-spacing:0.5em;">Acesso Restrito</span>
      </div>
      <h1 class="font-cormorant text-7xl md:text-8xl font-light tracking-wide mb-4" style="color:var(--ivory);">
        <span class="letter-highlight">E</span>LI<span class="letter-highlight">D</span>
      </h1>
      <p id="subtitle" class="text-sm tracking-[0.08em] uppercase font-light mb-3 whitespace-nowrap" style="color:var(--soft-mauve);">
        <span class="letter-highlight">E</span>nsino <span class="letter-highlight">L</span>egitimado para <span class="letter-highlight">I</span>nternos em <span class="letter-highlight">D</span>esenvolvimento
      </p>
      <p class="text-xs tracking-[0.3em] uppercase font-light mb-8" style="color:rgba(201,160,176,0.65);word-spacing:0.25em;">Sua Jornada Rumo à Residência Médica</p>
      <p class="font-script mb-12" style="color:rgba(201,160,176,0.7);font-size:1.1rem;letter-spacing:0.05em;">
        Inspirado em <span class="letter-highlight" style="font-style:normal;font-weight:500;">E</span>lisabete <span class="letter-highlight" style="font-style:normal;font-weight:500;">D</span>elfini
      </p>
      <button id="btn-enter" class="btn-access px-12 py-3 rounded-full text-sm tracking-widest uppercase text-white font-light">Acessar Plataformas</button>
    </div>

    <!-- Gate View -->
    <div id="gate-view" class="hidden text-center max-w-sm w-full view-transition">
      <div class="glass rounded-2xl p-8">
        <h2 class="font-cormorant text-3xl font-light mb-1" style="color:var(--ivory);"><span class="letter-highlight">E</span>LI<span class="letter-highlight">D</span></h2>
        <p class="text-xs tracking-wider mb-6" style="color:var(--soft-mauve);">Código de Acesso</p>
        <div class="space-y-4">
          <input id="input-gate" type="password" placeholder="Insira o código" class="input-field w-full px-4 py-3 rounded-lg text-sm text-center tracking-widest">
          <div id="gate-error" class="hidden text-xs" style="color:var(--rose-gold);"></div>
          <button id="btn-gate" class="btn-access w-full py-3 rounded-lg text-sm tracking-widest uppercase text-white font-light">Validar</button>
        </div>
        <div class="mt-6 pt-6 border-t" style="border-color:rgba(183,110,121,0.2);">
          <p class="text-xs font-light" style="color:rgba(201,160,176,0.4);">Desenvolvido por Jackeline Delfini</p>
        </div>
        <button id="btn-gate-back" class="mt-4 text-xs tracking-wider" style="color:rgba(201,160,176,0.5);">← Voltar</button>
      </div>
    </div>

    <!-- Auth View -->
    <div id="auth-view" class="hidden text-center max-w-sm w-full view-transition">
      <div class="glass rounded-2xl p-8">
        <h2 class="font-cormorant text-3xl font-light mb-1" style="color:var(--ivory);"><span class="letter-highlight">E</span>LI<span class="letter-highlight">D</span></h2>
        <p class="text-xs tracking-wider mb-6" style="color:var(--soft-mauve);">Identificação</p>
        <div class="space-y-4">
          <input id="input-user" type="email" placeholder="E-mail" class="input-field w-full px-4 py-3 rounded-lg text-sm">
          <input id="input-pass" type="password" placeholder="Senha" class="input-field w-full px-4 py-3 rounded-lg text-sm">
          <div id="auth-error" class="hidden text-xs" style="color:var(--rose-gold);"></div>
          <button id="btn-auth" class="btn-access w-full py-3 rounded-lg text-sm tracking-widest uppercase text-white font-light">
            <span id="btn-auth-text">Entrar</span>
            <span id="btn-auth-loading" class="hidden">...</span>
          </button>
          <p id="toggle-mode" class="text-xs cursor-pointer mt-2" style="color:var(--soft-mauve);">Criar conta</p>
          <p id="forgot-pass" class="text-xs cursor-pointer" style="color:rgba(201,160,176,0.6);">Esqueci minha senha</p>
        </div>
        <div class="mt-6 pt-6 border-t" style="border-color:rgba(183,110,121,0.2);">
          <p class="text-xs font-light" style="color:rgba(201,160,176,0.4);">Desenvolvido por Jackeline Delfini</p>
        </div>
        <button id="btn-back" class="mt-4 text-xs tracking-wider" style="color:rgba(201,160,176,0.5);">← Voltar</button>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAKN3qsYIc3pel81vl8WEAH6Ob4oR-icAM",
      authDomain: "jackeline-study-platform.firebaseapp.com",
      projectId: "jackeline-study-platform",
      storageBucket: "jackeline-study-platform.firebasestorage.app",
      messagingSenderId: "574246127117",
      appId: "1:574246127117:web:29eedab81ea4251b23f744"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Se já estiver logado, vai direto para a biblioteca
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '../biblioteca-web/';
      }
    });

    const ACCESS_CODE = 'RUMOARESIDENCIA0707!';
    let isLoginMode = true;
    let gatePassed = false;

    const landingView = document.getElementById('landing-view');
    const gateView = document.getElementById('gate-view');
    const authView = document.getElementById('auth-view');

    function showView(view) {
      [landingView, gateView, authView].forEach(v => {
        v.classList.add('hidden');
        v.style.opacity = '0';
        v.style.transform = 'translateY(10px)';
      });
      view.classList.remove('hidden');
      setTimeout(() => {
        view.style.opacity = '1';
        view.style.transform = 'translateY(0)';
      }, 10);
    }

    function showToast(msg, type) {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // Landing -> Gate
    document.getElementById('btn-enter').addEventListener('click', () => showView(gateView));
    document.getElementById('btn-gate-back').addEventListener('click', () => showView(landingView));
    document.getElementById('btn-back').addEventListener('click', () => showView(gateView));

    // Gate
    function validateGate() {
      const code = document.getElementById('input-gate').value.trim();
      const errEl = document.getElementById('gate-error');
      errEl.classList.add('hidden');
      if (code === ACCESS_CODE) {
        gatePassed = true;
        showToast('Acesso liberado!', 'success');
        showView(authView);
      } else {
        errEl.textContent = 'Código incorreto';
        errEl.classList.remove('hidden');
      }
    }
    document.getElementById('btn-gate').addEventListener('click', validateGate);
    document.getElementById('input-gate').addEventListener('keydown', (e) => { if (e.key === 'Enter') validateGate(); });

    // Toggle login/criar conta
    document.getElementById('toggle-mode').addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      document.getElementById('toggle-mode').textContent = isLoginMode ? 'Criar conta' : 'Já tenho conta';
      document.getElementById('btn-auth-text').textContent = isLoginMode ? 'Entrar' : 'Criar Conta';
    });

    // Esqueci senha
    document.getElementById('forgot-pass').addEventListener('click', async () => {
      const email = document.getElementById('input-user').value.trim();
      if (!email) { showToast('Digite seu e-mail primeiro', 'error'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showToast('E-mail de recuperação enviado!', 'success');
      } catch (e) {
        showToast('Erro ao enviar e-mail', 'error');
      }
    });

    // Login / Cadastro
    document.getElementById('btn-auth').addEventListener('click', async () => {
      const email = document.getElementById('input-user').value.trim();
      const pass = document.getElementById('input-pass').value.trim();
      const errEl = document.getElementById('auth-error');
      errEl.classList.add('hidden');

      if (!email || !pass) {
        errEl.textContent = 'Preencha todos os campos';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('btn-auth');
      btn.disabled = true;
      document.getElementById('btn-auth-text').classList.add('hidden');
      document.getElementById('btn-auth-loading').classList.remove('hidden');

      try {
        if (isLoginMode) {
          await signInWithEmailAndPassword(auth, email, pass);
          showToast('Bem-vinda!', 'success');
          setTimeout(() => { window.location.href = '../biblioteca-web/'; }, 800);
        } else {
          await createUserWithEmailAndPassword(auth, email, pass);
          showToast('Conta criada! Entrando...', 'success');
          setTimeout(() => { window.location.href = '../biblioteca-web/'; }, 800);
        }
      } catch (e) {
        const msgs = {
          'auth/user-not-found': 'Usuário não encontrado',
          'auth/wrong-password': 'Senha incorreta',
          'auth/invalid-credential': 'E-mail ou senha incorretos',
          'auth/email-already-in-use': 'E-mail já cadastrado',
          'auth/weak-password': 'Senha muito fraca (mínimo 6 caracteres)',
          'auth/invalid-email': 'E-mail inválido',
          'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.'
        };
        errEl.textContent = msgs[e.code] || 'Erro ao entrar. Tente novamente.';
        errEl.classList.remove('hidden');
      }

      btn.disabled = false;
      document.getElementById('btn-auth-text').classList.remove('hidden');
      document.getElementById('btn-auth-loading').classList.add('hidden');
    });

    // Enter no campo de senha
    document.getElementById('input-pass').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-auth').click();
    });

  </script>

  <!-- Canvas Background -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * 2000, y: Math.random() * 2000,
        vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.15,
        r: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.4 + 0.1
      });
    }

    function drawAsclepius(t) {
      const cx = w * 0.86, top = h * 0.08, bottom = h * 0.92, len = bottom - top;
      ctx.save();
      ctx.globalAlpha = 0.2;
      const staffGrad = ctx.createLinearGradient(cx-8, top, cx+8, bottom);
      staffGrad.addColorStop(0, 'rgba(247,231,206,0.85)');
      staffGrad.addColorStop(0.5, 'rgba(201,160,176,0.9)');
      staffGrad.addColorStop(1, 'rgba(247,231,206,0.85)');
      ctx.strokeStyle = staffGrad; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cx, top); ctx.lineTo(cx, bottom); ctx.stroke();
      ctx.fillStyle = 'rgba(247,231,206,0.88)';
      ctx.beginPath(); ctx.arc(cx, top-5, 7, 0, Math.PI*2); ctx.fill();
      const serpCoils = 6, amp = 38, breathe = Math.sin(t*0.85)*3;
      const serpGrad = ctx.createLinearGradient(cx-amp, top, cx+amp, bottom);
      serpGrad.addColorStop(0, 'rgba(201,160,176,0.88)');
      serpGrad.addColorStop(0.5, 'rgba(183,110,121,0.92)');
      serpGrad.addColorStop(1, 'rgba(201,160,176,0.88)');
      ctx.strokeStyle = serpGrad; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i <= len; i += 1.2) {
        const p = i/len, phase = p*Math.PI*2*serpCoils + t*1.25, taper = 0.35 + 0.65*Math.sin(p*Math.PI);
        const x = cx + Math.sin(phase)*(amp+breathe)*taper, y = top+i;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.fillStyle = 'rgba(247,231,206,0.25)';
      for (let i = 15; i <= len; i += 18) {
        const p = i/len, phase = p*Math.PI*2*serpCoils + t*1.25, taper = 0.35+0.65*Math.sin(p*Math.PI);
        const x = cx+Math.sin(phase)*(amp+breathe)*taper, y = top+i;
        ctx.save(); ctx.translate(x,y); ctx.rotate(phase+Math.PI/2); ctx.fillRect(-1.4,-1,2.8,2); ctx.restore();
      }
      const headP=0.015, headPhase=headP*Math.PI*2*serpCoils+t*1.25, headTaper=0.35+0.65*Math.sin(headP*Math.PI);
      const headX=cx+Math.sin(headPhase)*(amp+breathe)*headTaper, headY=top+8;
      ctx.fillStyle='rgba(201,160,176,0.92)';
      ctx.beginPath(); ctx.moveTo(headX+7,headY); ctx.lineTo(headX-3,headY-6); ctx.lineTo(headX-3,headY+6); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(247,231,206,0.8)'; ctx.beginPath(); ctx.arc(headX-0.5,headY-1.5,1.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(45,27,46,0.9)'; ctx.beginPath(); ctx.arc(headX-0.5,headY-1.5,0.7,0,Math.PI*2); ctx.fill();
      const tongue=6+Math.sin(t*4.2)*2.5, tongueAngle=Math.sin(t*3)*0.35;
      ctx.strokeStyle='rgba(201,160,176,0.8)'; ctx.lineWidth=1.2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(headX+7,headY); ctx.lineTo(headX+6+tongue,headY-2.5+tongueAngle); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(headX+7,headY); ctx.lineTo(headX+6+tongue,headY+2.5-tongueAngle); ctx.stroke();
      ctx.restore();
    }

    function drawBg() {
      ctx.clearRect(0,0,w,h);
      const t = Date.now()*0.0008, ta = Date.now()*0.0003;
      const grd = ctx.createRadialGradient(w*0.5+Math.sin(ta)*100, h*0.3, 50, w*0.5, h*0.5, h*0.8);
      grd.addColorStop(0,'rgba(183,110,121,0.06)'); grd.addColorStop(0.5,'rgba(45,27,46,0)'); grd.addColorStop(1,'rgba(45,27,46,0)');
      ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);
      drawAsclepius(t);
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0) p.x=w; if(p.x>w) p.x=0; if(p.y<0) p.y=h; if(p.y>h) p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(247,231,206,${p.alpha})`; ctx.fill();
      });
      requestAnimationFrame(drawBg);
    }
    drawBg();

    lucide.createIcons();
  </script>
</body>
</html>
